<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landen Raden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{--violet:#0d9488;--violet-dark:#0f766e;}
  .top{width:100%;max-width:560px;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}
  .card{background:#fff;width:100%;max-width:560px;border-radius:30px;padding:26px 24px 30px;box-shadow:0 18px 40px rgba(43,45,107,.12);text-align:center;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
  .sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
  .best{color:var(--violet-dark);font-weight:800;font-size:.9rem;margin-bottom:12px;min-height:1.1em;}
  .levelbar{display:flex;gap:7px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--surface2);}
  .dot.done{background:var(--mint);}
  .dot.active{background:var(--violet);transform:scale(1.3);}
  .flag{font-size:5rem;margin-bottom:8px;line-height:1;}
  .qtype{display:inline-block;font-family:'Fredoka',sans-serif;font-weight:600;color:var(--violet-dark);background:var(--surface);border-radius:999px;padding:6px 16px;font-size:.95rem;margin-bottom:10px;}
  .q{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.25rem;color:var(--ink);margin-bottom:16px;}
  .opts{display:grid;gap:10px;}
  .opt{font-family:'Fredoka',sans-serif;font-weight:500;font-size:1.1rem;color:var(--ink);background:var(--surface);border:none;border-radius:16px;padding:14px 18px;cursor:pointer;box-shadow:0 5px 0 var(--surface2);transition:transform .06s;text-align:left;}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);}
  .opt.good{background:var(--good);color:#fff;box-shadow:0 5px 0 #11823b;}
  .opt.bad{background:var(--bad);color:#fff;box-shadow:0 5px 0 #a81d1d;}
  .feedback{min-height:30px;font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:600;margin-top:14px;}
  .feedback.good{color:var(--good);}
  .feedback.bad{color:var(--bad);}
  .points-pill{background:linear-gradient(180deg,#ffe9a8,#ffd45e);}
  .points-pill .val{color:#8a5b00;}
</style>
</head>
<body>
<a class="back" href="index.html">← Menu</a>
<div class="top">
  <div class="pill"><span class="lbl">Goed</span><span class="val" id="score">0</span></div>
  <div class="pill points-pill"><span class="lbl">Op rij</span><span class="val" id="streak">0</span></div>
</div>
<div class="card">
  <h1>🌍 Landen raden</h1>
  <p class="sub">Van welk land is de vlag of hoofdstad?</p>
  <div class="best" id="bestEl"></div>
  <div class="levelbar" id="levelbar"></div>

  <div id="startScreen">
    <div class="flag">🌍</div>
    <p class="q">Raad landen aan de hand van hun vlag of hoofdstad! 10 vragen.</p>
    <button class="bigbtn" id="startBtn">Start 🚀</button>
  </div>

  <div id="playScreen" class="hidden-el">
    <div class="flag" id="flagEl"></div>
    <div class="qtype" id="qtypeEl"></div>
    <div class="q" id="qEl"></div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div id="endScreen" class="hidden-el">
    <div style="font-size:3.4rem" id="endEmoji">🎉</div>
    <h1 id="endTitle">Goed gedaan!</h1>
    <p class="sub" id="endText"></p>
    <button class="bigbtn" id="againBtn">Nog een keer 🔁</button>
  </div>
</div>

<script>
const DATA=[
  {n:'Nederland',    c:'Amsterdam',   f:'🇳🇱'},
  {n:'Duitsland',    c:'Berlijn',     f:'🇩🇪'},
  {n:'Frankrijk',    c:'Parijs',      f:'🇫🇷'},
  {n:'Spanje',       c:'Madrid',      f:'🇪🇸'},
  {n:'Italië',       c:'Rome',        f:'🇮🇹'},
  {n:'Verenigd Koninkrijk',c:'Londen',f:'🇬🇧'},
  {n:'Verenigde Staten',   c:'Washington D.C.',f:'🇺🇸'},
  {n:'Japan',        c:'Tokio',       f:'🇯🇵'},
  {n:'Brazilië',     c:'Brasília',    f:'🇧🇷'},
  {n:'Australië',    c:'Canberra',    f:'🇦🇺'},
  {n:'China',        c:'Peking',      f:'🇨🇳'},
  {n:'België',       c:'Brussel',     f:'🇧🇪'},
  {n:'Portugal',     c:'Lissabon',    f:'🇵🇹'},
  {n:'Zweden',       c:'Stockholm',   f:'🇸🇪'},
  {n:'Noorwegen',    c:'Oslo',        f:'🇳🇴'},
  {n:'Griekenland',  c:'Athene',      f:'🇬🇷'},
  {n:'Turkije',      c:'Ankara',      f:'🇹🇷'},
  {n:'India',        c:'New Delhi',   f:'🇮🇳'},
  {n:'Mexico',       c:'Mexico-Stad', f:'🇲🇽'},
  {n:'Zuid-Korea',   c:'Seoul',       f:'🇰🇷'},
  {n:'Egypte',       c:'Caïro',       f:'🇪🇬'},
  {n:'Rusland',      c:'Moskou',      f:'🇷🇺'},
  {n:'Canada',       c:'Ottawa',      f:'🇨🇦'},
  {n:'Argentinië',   c:'Buenos Aires',f:'🇦🇷'},
  {n:'Marokko',      c:'Rabat',       f:'🇲🇦'},
];
const TOTAL=10,BKEY='landenraden_best';
const shuffle=a=>[...a].map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(p=>p[1]);
const $=id=>document.getElementById(id);

let best=0;try{best=parseInt(localStorage.getItem(BKEY)||'0')||0;}catch(e){}
let queue=[],idx=0,score=0,streak=0,cur=null,answered=false;

function showBest(){$('bestEl').textContent=best>0?'🏅 Beste: '+best+' / '+TOTAL:'';}showBest();

function buildLevelbar(){
  const b=$('levelbar');b.innerHTML='';
  for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i<idx?' done':i===idx?' active':'');b.appendChild(d);}
}

function buildQuestion(country){
  // Alternate between two question types
  const type=idx%2===0?'flag':'capital';
  if(type==='flag'){
    $('flagEl').textContent=country.f;
    $('qtypeEl').textContent='🚩 Welk land?';
    $('qEl').textContent='Van welk land is dit de vlag?';
    return {correct:country.n,getOption:d=>d.n};
  } else {
    $('flagEl').textContent=country.f;
    $('qtypeEl').textContent='🏙️ Hoofdstad';
    $('qEl').textContent='De hoofdstad is: '+country.c+'. Welk land is dit?';
    return {correct:country.n,getOption:d=>d.n};
  }
}

function render(){
  answered=false;cur=queue[idx];buildLevelbar();
  $('feedback').textContent='';$('feedback').className='feedback';
  const {correct,getOption}=buildQuestion(cur);
  // Pick 3 wrong options
  const others=shuffle(DATA.filter(d=>d.n!==cur.n)).slice(0,3);
  const allOpts=shuffle([cur,...others]);
  const o=$('opts');o.innerHTML='';
  allOpts.forEach(d=>{
    const b=document.createElement('button');b.className='opt';b.textContent=getOption(d);
    b.onclick=()=>answer(b,getOption(d),correct);o.appendChild(b);
  });
}

function answer(btn,val,correct){
  if(answered)return;answered=true;
  const fb=$('feedback');
  [...$('opts').children].forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('good');});
  if(val===correct){score++;streak++;$('score').textContent=score;$('streak').textContent=streak;
    fb.className='feedback good';fb.textContent=(streak>=3?'🔥 ':'✅ ')+['Goed zo!','Slim!','Correct!','Top!'][Math.floor(Math.random()*4)];}
  else{streak=0;$('streak').textContent=0;btn.classList.add('bad');
    fb.className='feedback bad';fb.textContent='❌ Het was: '+correct;}
  idx++;buildLevelbar();
  setTimeout(()=>{if(idx>=TOTAL)endGame();else render();},1300);
}

function startGame(){
  queue=shuffle(DATA).slice(0,TOTAL);idx=0;score=0;streak=0;
  $('score').textContent=0;$('streak').textContent=0;
  $('startScreen').classList.add('hidden-el');$('endScreen').classList.add('hidden-el');$('playScreen').classList.remove('hidden-el');
  render();
}

function endGame(){
  $('playScreen').classList.add('hidden-el');$('endScreen').classList.remove('hidden-el');
  let rec=false;if(score>best){best=score;rec=true;try{localStorage.setItem(BKEY,String(best));}catch(e){}}showBest();
  $('endText').innerHTML='Je had <b>'+score+' van de '+TOTAL+'</b> goed!'+(rec&&score>0?' 🏅 record!':'');
  $('endEmoji').textContent=score===TOTAL?'🏆':(score>=7?'🎉':'💪');
  $('endTitle').textContent=score===TOTAL?'Geograaf!':(score>=7?'Goed gedaan!':'Blijf oefenen!');
}

$('startBtn').onclick=startGame;$('againBtn').onclick=startGame;
</script>
</body>
</html>
