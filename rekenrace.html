<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rekenrace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{
    --cream:#FFF8EE; --ink:#2B2D6B; --ink-soft:#6A6CA8;
    --sun:#FFC83D; --coral:#FF6B5C; --mint:#2ED6A6; --sky:#3DC9FF;
    --violet:#FF6B5C; --violet-dark:#d6493b;
    --good:#16a34a; --bad:#dc2626;
    --surface:#F3F1FB; --surface2:#EBE7FB;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 120% at 50% 0%, #FFFDF8 0%, var(--cream) 55%, #FBEFDD 100%);
    background-attachment:fixed;
    min-height:100%;
    display:flex;align-items:center;justify-content:center;
    padding:18px;overflow-x:hidden;
  }
  .app{width:100%;max-width:440px;}

  /* ---------- shared ---------- */
  .card{
    background:#fff;
    border-radius:26px;
    padding:26px 22px;
    box-shadow:0 18px 40px rgba(43,45,107,.12);
  }
  .display-font{font-family:'Fredoka',sans-serif}
  .eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;line-height:1;font-size:3.1rem;letter-spacing:-.02em;margin:.15em 0 .1em;color:var(--ink);}
  h1 .race{color:var(--violet-dark)}
  .sub{color:var(--ink-soft);font-size:1rem;margin-bottom:22px;font-weight:700;}
  .label{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;margin:18px 0 10px}

  .chips{display:flex;gap:10px;flex-wrap:wrap}
  .chip{
    flex:1;min-width:64px;
    font-family:'Fredoka',sans-serif;font-size:1.5rem;
    padding:14px 0;border-radius:16px;cursor:pointer;
    background:var(--surface);border:2px solid transparent;
    color:var(--ink);transition:transform .12s, background .15s, border-color .15s;
    user-select:none;text-align:center;
  }
  .chip.small{font-size:1rem;font-weight:800;font-family:'Nunito',sans-serif}
  .chip:hover{background:var(--surface2)}
  .chip:active{transform:scale(.94)}
  .chip.on{background:var(--violet);color:#fff;border-color:transparent}
  .chip.on.teal{background:var(--violet);color:#fff}

  .start-btn{
    width:100%;margin-top:26px;border:0;cursor:pointer;
    font-family:'Fredoka',sans-serif;font-size:1.5rem;font-weight:500;
    color:#fff;padding:18px;border-radius:18px;
    background:var(--violet);
    box-shadow:0 8px 0 var(--violet-dark);
    transition:transform .08s;
  }
  .start-btn:active{transform:translateY(5px);box-shadow:0 3px 0 var(--violet-dark)}
  .start-btn:disabled{opacity:.4;cursor:not-allowed;}
  .hint{color:var(--ink-soft);font-size:.8rem;text-align:center;margin-top:12px;font-weight:700;}

  /* ---------- game ---------- */
  .topbar{display:flex;gap:10px;margin-bottom:14px}
  .stat{flex:1;background:var(--surface);border-radius:16px;padding:10px 8px;text-align:center;}
  .stat .k{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:800}
  .stat .v{font-family:'Fredoka',sans-serif;font-size:1.7rem;line-height:1.1;margin-top:2px}
  .stat.time .v{color:var(--sky)}
  .stat.time.warn .v{color:var(--bad)}
  .streak-tag{display:inline-block;font-family:'Fredoka',sans-serif;font-size:.95rem;color:var(--violet-dark);min-height:1.1em}

  .timebar{height:7px;border-radius:99px;background:var(--surface2);overflow:hidden;margin-bottom:16px}
  .timebar > i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--sky),var(--violet));transform-origin:left;transition:transform .25s linear}

  .question{background:var(--surface);border-radius:22px;padding:30px 16px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;}
  .sum{font-family:'Fredoka',sans-serif;font-weight:600;font-size:3.2rem;line-height:1;color:var(--ink)}
  .sum .op{color:var(--violet-dark);margin:0 .12em}
  .answer{font-family:'Fredoka',sans-serif;font-size:3rem;margin-top:14px;min-height:1.1em;letter-spacing:.02em;color:var(--ink)}
  .answer .ph{color:var(--ink-soft);opacity:.5}
  .answer .car{color:var(--violet);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .question.good{animation:pop .35s ease}
  .question.bad{animation:shake .4s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.04);box-shadow:0 0 0 3px var(--good) inset}100%{transform:scale(1)}}
  @keyframes shake{10%,90%{transform:translateX(-6px)}30%,70%{transform:translateX(7px)}50%{transform:translateX(-5px)}0%,100%{transform:translateX(0)}}
  .question.bad{box-shadow:0 0 0 2px var(--bad) inset}

  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .key{
    font-family:'Fredoka',sans-serif;font-size:1.9rem;
    padding:16px 0;border-radius:16px;border:0;cursor:pointer;
    background:var(--surface);color:var(--ink);
    box-shadow:0 5px 0 var(--surface2);
    transition:transform .08s, background .12s;user-select:none;
  }
  .key:hover{background:var(--surface2)}
  .key:active{transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);background:var(--violet);color:#fff}
  .key.act{background:#ffe2dd;}
  .key.ok{background:var(--mint);color:#fff;box-shadow:0 5px 0 #16b487}
  .key.ok:active{background:var(--mint);box-shadow:0 2px 0 #16b487}

  /* ---------- end ---------- */
  .end{text-align:center}
  .end .big{font-family:'Fredoka',sans-serif;font-size:5rem;line-height:1;color:var(--violet-dark);margin:6px 0}
  .end .msg{font-family:'Fredoka',sans-serif;font-size:1.5rem;margin-bottom:4px;color:var(--ink)}
  .recap{display:flex;gap:10px;margin:22px 0 6px}
  .pill{flex:1;background:var(--surface);border-radius:16px;padding:14px 6px;}
  .pill .k{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:800}
  .pill .v{font-family:'Fredoka',sans-serif;font-size:1.6rem;margin-top:2px}
  .pill .v.green{color:var(--good)} .pill .v.coral{color:var(--coral)}
  .best{color:var(--violet-dark);font-weight:800;margin-top:14px;min-height:1.3em}

  .hidden{display:none}

  .menu-link{
    position:fixed;top:14px;left:14px;z-index:10;
    font-family:'Fredoka',sans-serif;font-weight:500;font-size:.95rem;color:var(--ink);text-decoration:none;
    background:#fff;border-radius:14px;padding:8px 14px;box-shadow:0 5px 0 rgba(43,45,107,.10);
  }
  .menu-link:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(43,45,107,.10)}

  @media (max-width:380px){
    h1{font-size:2.6rem}.sum{font-size:2.6rem}.answer{font-size:2.5rem}.key{font-size:1.6rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<a class="menu-link" href="index.html">← Menu</a>
<div class="app">

  <!-- ============ START ============ -->
  <section id="start" class="card">
    <div class="eyebrow">Reken op tijd</div>
    <h1 class="display-font">Reken<span class="race">race</span></h1>
    <p class="sub">Hoeveel sommen kraak je voordat de tijd om is?</p>

    <div class="label">Soort sommen</div>
    <div class="chips" id="ops">
      <div class="chip on" data-op="+">+</div>
      <div class="chip on" data-op="−">−</div>
      <div class="chip" data-op="×">×</div>
      <div class="chip" data-op="÷">÷</div>
    </div>

    <div class="label">Niveau</div>
    <div class="chips" id="levels">
      <div class="chip small on teal" data-level="1">Makkelijk</div>
      <div class="chip small" data-level="2">Gemiddeld</div>
      <div class="chip small" data-level="3">Moeilijk</div>
    </div>

    <div class="label">Tijd</div>
    <div class="chips" id="times">
      <div class="chip small" data-time="30">30s</div>
      <div class="chip small on teal" data-time="60">60s</div>
      <div class="chip small" data-time="90">90s</div>
    </div>

    <button class="start-btn display-font" id="startBtn">Start de race</button>
    <p class="hint">Tip: op de computer kun je ook gewoon typen ⌨️</p>
  </section>

  <!-- ============ GAME ============ -->
  <section id="game" class="hidden">
    <div class="topbar">
      <div class="stat"><div class="k">Score</div><div class="v" id="score">0</div></div>
      <div class="stat"><div class="k">Goed</div><div class="v" id="correct">0</div></div>
      <div class="stat time" id="timeStat"><div class="k">Tijd</div><div class="v" id="time">60</div></div>
    </div>
    <div class="timebar"><i id="timeFill"></i></div>

    <div style="text-align:center;margin-bottom:8px"><span class="streak-tag" id="streak"></span></div>

    <div class="question" id="qBox">
      <div class="sum" id="sum">3 <span class="op">+</span> 4</div>
      <div class="answer" id="answer"><span class="ph">?</span></div>
    </div>

    <div class="pad" id="pad">
      <button class="key" data-k="1">1</button>
      <button class="key" data-k="2">2</button>
      <button class="key" data-k="3">3</button>
      <button class="key" data-k="4">4</button>
      <button class="key" data-k="5">5</button>
      <button class="key" data-k="6">6</button>
      <button class="key" data-k="7">7</button>
      <button class="key" data-k="8">8</button>
      <button class="key" data-k="9">9</button>
      <button class="key act" data-k="del">⌫</button>
      <button class="key" data-k="0">0</button>
      <button class="key ok" data-k="ok">=</button>
    </div>
  </section>

  <!-- ============ END ============ -->
  <section id="end" class="card end hidden">
    <div class="eyebrow">Tijd is om!</div>
    <div class="big display-font" id="endScore">0</div>
    <div class="msg display-font" id="endMsg">Goed gedaan!</div>
    <div class="recap">
      <div class="pill"><div class="k">Goed</div><div class="v green" id="endCorrect">0</div></div>
      <div class="pill"><div class="k">Fout</div><div class="v coral" id="endWrong">0</div></div>
      <div class="pill"><div class="k">Beste reeks</div><div class="v" id="endStreak">0</div></div>
    </div>
    <div class="best" id="best"></div>
    <button class="start-btn display-font" id="againBtn">Nog een keer</button>
  </section>

</div>

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);

  // ---- settings state ----
  const ops = new Set(["+","−"]);
  let level = 1;
  let duration = 60;
  const BEST_KEY = "rekenrace_best";
  let bestScore = 0;
  try { bestScore = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0; } catch(e){}

  // ---- multi-select operations ----
  $("#ops").addEventListener("click", e=>{
    const c = e.target.closest(".chip"); if(!c) return;
    const op = c.dataset.op;
    if(ops.has(op)){ if(ops.size>1){ ops.delete(op); c.classList.remove("on"); } }
    else { ops.add(op); c.classList.add("on"); }
  });
  // ---- single-select level ----
  $("#levels").addEventListener("click", e=>{
    const c = e.target.closest(".chip"); if(!c) return;
    document.querySelectorAll("#levels .chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on"); level = +c.dataset.level;
  });
  // ---- single-select time ----
  $("#times").addEventListener("click", e=>{
    const c = e.target.closest(".chip"); if(!c) return;
    document.querySelectorAll("#times .chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on"); duration = +c.dataset.time;
  });

  // ---- question generator ----
  const rnd = (a,b)=> a + Math.floor(Math.random()*(b-a+1));
  function makeQuestion(){
    const pool = [...ops];
    const op = pool[rnd(0,pool.length-1)];
    let a,b,ans, ranges = {1:[10,5,3],2:[50,10,8],3:[100,12,12]}[level];
    const [addMax, mulMax, divMax] = ranges;
    if(op==="+"){ a=rnd(1,addMax); b=rnd(1,addMax); ans=a+b; }
    else if(op==="−"){ a=rnd(1,addMax); b=rnd(0,a); ans=a-b; }      // never negative
    else if(op==="×"){ a=rnd(2,mulMax); b=rnd(2,mulMax); ans=a*b; }
    else { b=rnd(2,divMax); ans=rnd(2,divMax); a=b*ans; }          // clean division
    return {a,b,op,ans};
  }

  // ---- game state ----
  let cur, typed, score, correct, wrong, streak, bestStreak, timeLeft, timer;

  function startGame(){
    score=0; correct=0; wrong=0; streak=0; bestStreak=0; typed=""; timeLeft=duration;
    $("#start").classList.add("hidden");
    $("#end").classList.add("hidden");
    $("#game").classList.remove("hidden");
    $("#score").textContent="0"; $("#correct").textContent="0";
    $("#time").textContent=duration; $("#timeStat").classList.remove("warn");
    $("#timeFill").style.transform="scaleX(1)";
    updateStreak();
    nextQuestion();
    clearInterval(timer);
    timer = setInterval(tick, 1000);
  }

  function tick(){
    timeLeft--;
    $("#time").textContent = timeLeft;
    $("#timeFill").style.transform = "scaleX("+Math.max(0,timeLeft/duration)+")";
    if(timeLeft<=10) $("#timeStat").classList.add("warn");
    if(timeLeft<=0) endGame();
  }

  function nextQuestion(){
    cur = makeQuestion(); typed="";
    $("#sum").innerHTML = cur.a + ' <span class="op">'+cur.op+'</span> ' + cur.b;
    renderAnswer();
  }

  function renderAnswer(){
    const el = $("#answer");
    if(typed==="") el.innerHTML = '<span class="ph">?</span>';
    else el.innerHTML = typed + '<span class="car">|</span>';
  }

  function updateStreak(){
    $("#streak").textContent = streak>=2 ? ("🔥 "+streak+" op rij  ×"+multiplier()) : "";
  }
  function multiplier(){ return streak>=8?3 : streak>=4?2 : 1; }

  function press(k){
    if(k==="del"){ typed=typed.slice(0,-1); renderAnswer(); return; }
    if(k==="ok"){ submit(); return; }
    if(typed.length>=4) return;
    if(typed==="0") typed=""; // no leading zero
    typed += k; renderAnswer();
  }

  function submit(){
    if(typed==="") return;
    const box = $("#qBox");
    if(parseInt(typed,10)===cur.ans){
      correct++;
      streak++; bestStreak=Math.max(bestStreak,streak);
      const base = {1:10,2:15,3:25}[level];
      score += base * multiplier();
      $("#score").textContent = score;
      $("#correct").textContent = correct;
      updateStreak();
      box.classList.remove("bad"); void box.offsetWidth; box.classList.add("good");
      setTimeout(()=>box.classList.remove("good"),350);
      nextQuestion();
    } else {
      wrong++; streak=0; updateStreak();
      box.classList.remove("good"); void box.offsetWidth; box.classList.add("bad");
      setTimeout(()=>box.classList.remove("bad"),400);
      typed=""; renderAnswer();
    }
  }

  function endGame(){
    clearInterval(timer);
    $("#game").classList.add("hidden");
    $("#end").classList.remove("hidden");
    $("#endScore").textContent = score;
    $("#endCorrect").textContent = correct;
    $("#endWrong").textContent = wrong;
    $("#endStreak").textContent = bestStreak;
    $("#endMsg").textContent = praise(correct, wrong);
    if(score>bestScore){
      bestScore=score;
      try { localStorage.setItem(BEST_KEY, String(bestScore)); } catch(e){}
      $("#best").textContent = "🏆 Nieuw record!";
    } else {
      $("#best").textContent = "Beste score: " + bestScore;
    }
  }

  function praise(c,w){
    const total=c+w, acc = total? c/total : 0;
    if(c===0) return "Volgende keer beter!";
    if(acc>=.95 && c>=15) return "Rekenmonster! 🧠";
    if(acc>=.9) return "Bijna foutloos!";
    if(c>=20) return "Razendsnel! ⚡";
    if(acc>=.75) return "Goed bezig!";
    return "Lekker geoefend!";
  }

  // ---- inputs ----
  $("#pad").addEventListener("click", e=>{
    const k = e.target.closest(".key"); if(k) press(k.dataset.k);
  });
  document.addEventListener("keydown", e=>{
    if($("#game").classList.contains("hidden")) return;
    if(e.key>="0" && e.key<="9") press(e.key);
    else if(e.key==="Backspace"){ e.preventDefault(); press("del"); }
    else if(e.key==="Enter" || e.key==="="){ e.preventDefault(); press("ok"); }
  });
  $("#startBtn").addEventListener("click", startGame);
  $("#againBtn").addEventListener("click", ()=>{
    $("#end").classList.add("hidden");
    $("#start").classList.remove("hidden");
  });
})();
</script>
</body>
</html>
