<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weetjesquiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{--violet:#c558c5;--violet-dark:#a043a0;}
  .top{width:100%;max-width:560px;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}
  .points-pill{background:linear-gradient(180deg,#FFE9A8,#FFD45E);}
  .points-pill .val{color:#8a5b00;}
  .card{background:#fff;width:100%;max-width:560px;border-radius:30px;padding:26px 24px 30px;box-shadow:0 18px 40px rgba(43,45,107,.12);text-align:center;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
  .sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
  .best{color:var(--violet-dark);font-weight:800;font-size:.9rem;margin-bottom:12px;min-height:1.1em;}
  .levelbar{display:flex;gap:7px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--surface2);}
  .dot.done{background:var(--mint);}
  .dot.active{background:var(--violet);transform:scale(1.3);}
  .cat{display:inline-block;font-family:'Fredoka',sans-serif;font-weight:600;color:var(--violet-dark);
    background:var(--surface);border-radius:999px;padding:6px 16px;font-size:.95rem;margin-bottom:10px;}
  .q{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.3rem;color:var(--ink);margin-bottom:16px;min-height:2.6em;display:flex;align-items:center;justify-content:center;}
  .opts{display:grid;gap:12px;}
  .opt{font-family:'Fredoka',sans-serif;font-weight:500;font-size:1.15rem;color:var(--ink);background:var(--surface);
    border:none;border-radius:16px;padding:15px 18px;cursor:pointer;box-shadow:0 5px 0 var(--surface2);transition:transform .06s;text-align:left;}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);}
  .opt.good{background:var(--good);color:#fff;box-shadow:0 5px 0 #11823b;}
  .opt.bad{background:var(--bad);color:#fff;box-shadow:0 5px 0 #a81d1d;}
  .feedback{min-height:30px;font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:600;margin-top:14px;}
  .feedback.good{color:var(--good);}
  .feedback.bad{color:var(--bad);}
</style>
</head>
<body>
  <a class="back" href="index.html">← Menu</a>
  <div class="top">
    <div class="pill"><span class="lbl">Goed</span><span class="val" id="score">0</span></div>
    <div class="pill points-pill"><span class="lbl">Op rij</span><span class="val" id="streak">0</span></div>
  </div>
  <div class="card">
    <h1>💡 Weetjesquiz</h1>
    <p class="sub">Leuke weetjes over dieren, ruimte, natuur en meer!</p>
    <div class="best" id="best"></div>
    <div class="levelbar" id="levelbar"></div>

    <div id="startScreen">
      <p class="q">Weet jij de antwoorden? 10 vragen, hoeveel heb jij goed?</p>
      <button class="bigbtn" id="startBtn">Start 🚀</button>
    </div>

    <div id="playScreen" class="hidden-el">
      <div class="cat" id="cat">Categorie</div>
      <div class="q" id="question"></div>
      <div class="opts" id="opts"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div id="endScreen" class="hidden-el">
      <div style="font-size:3.4rem" id="endEmoji">🎉</div>
      <h1 id="endTitle">Goed gedaan!</h1>
      <p class="sub" id="endText"></p>
      <button class="bigbtn" id="againBtn">Nog een keer 🔁</button>
    </div>
  </div>

<script>
  const BANK=[
    {c:"🐾 Dieren", q:"Hoeveel poten heeft een spin?", a:"8", o:["6","8","10","4"]},
    {c:"🐾 Dieren", q:"Wat is het grootste dier ter wereld?", a:"De blauwe vinvis", o:["De olifant","De blauwe vinvis","De giraf","De witte haai"]},
    {c:"🐾 Dieren", q:"Wat eet een panda het liefst?", a:"Bamboe", o:["Vis","Bamboe","Vlees","Wortels"]},
    {c:"🐾 Dieren", q:"Welk dier kan van kleur veranderen?", a:"De kameleon", o:["De kikker","De kameleon","De papegaai","De slang"]},
    {c:"🐾 Dieren", q:"Hoeveel poten heeft een insect?", a:"6", o:["4","6","8","10"]},
    {c:"🐾 Dieren", q:"Welke vogel legt de grootste eieren?", a:"De struisvogel", o:["De adelaar","De struisvogel","De pinguïn","De zwaan"]},
    {c:"🐾 Dieren", q:"Hoeveel harten heeft een octopus?", a:"3", o:["1","2","3","5"]},
    {c:"🚀 Ruimte", q:"Welke planeet staat het dichtst bij de zon?", a:"Mercurius", o:["Venus","Mercurius","Mars","Aarde"]},
    {c:"🚀 Ruimte", q:"Welke planeet noemen we de rode planeet?", a:"Mars", o:["Jupiter","Mars","Saturnus","Venus"]},
    {c:"🚀 Ruimte", q:"Wat draait er om de aarde?", a:"De maan", o:["De zon","De maan","Mars","De sterren"]},
    {c:"🚀 Ruimte", q:"Hoeveel planeten heeft ons zonnestelsel?", a:"8", o:["7","8","9","10"]},
    {c:"🚀 Ruimte", q:"Wat is de grootste planeet?", a:"Jupiter", o:["Aarde","Jupiter","Saturnus","Neptunus"]},
    {c:"🚀 Ruimte", q:"Wat is de zon eigenlijk?", a:"Een ster", o:["Een planeet","Een ster","Een maan","Een wolk"]},
    {c:"🌳 Natuur", q:"Welke kleur krijg je als je blauw en geel mengt?", a:"Groen", o:["Paars","Groen","Oranje","Bruin"]},
    {c:"🌳 Natuur", q:"Hoeveel kleuren heeft een regenboog?", a:"7", o:["5","6","7","8"]},
    {c:"🌳 Natuur", q:"Waar maken planten hun voedsel mee?", a:"Met zonlicht", o:["Met zonlicht","Met maanlicht","Met wind","Met steen"]},
    {c:"🌳 Natuur", q:"Hoe heet bevroren water?", a:"IJs", o:["Stoom","IJs","Mist","Regen"]},
    {c:"🌳 Natuur", q:"Welk seizoen komt na de winter?", a:"De lente", o:["De zomer","De herfst","De lente","De winter weer"]},
    {c:"🧍 Lichaam", q:"Welk orgaan pompt jouw bloed rond?", a:"Het hart", o:["De longen","Het hart","De maag","De lever"]},
    {c:"🧍 Lichaam", q:"Hoeveel zintuigen heeft een mens?", a:"5", o:["3","4","5","6"]},
    {c:"🧍 Lichaam", q:"Waarmee ruik je?", a:"Met je neus", o:["Met je oren","Met je neus","Met je ogen","Met je tong"]},
    {c:"🧍 Lichaam", q:"Hoeveel tanden heeft een volwassene ongeveer?", a:"32", o:["20","28","32","40"]},
    {c:"🧀 Nederland", q:"Wat is de hoofdstad van Nederland?", a:"Amsterdam", o:["Rotterdam","Den Haag","Amsterdam","Utrecht"]},
    {c:"🧀 Nederland", q:"Welke kleur zit NIET in de Nederlandse vlag?", a:"Groen", o:["Rood","Wit","Blauw","Groen"]},
    {c:"🧀 Nederland", q:"Welk vervoermiddel hoort echt bij Nederland?", a:"De fiets", o:["De fiets","De kabelbaan","De gondel","De slee"]},
  ];
  const TOTAL=10, BEST_KEY="weetjesquiz_best";
  let best=0; try{best=parseInt(localStorage.getItem(BEST_KEY)||"0",10)||0;}catch(e){}
  let queue=[], idx=0, score=0, streak=0, cur=null, answered=false;
  const $=id=>document.getElementById(id);
  function showBest(){ $("best").textContent=best>0?("🏅 Beste: "+best+" / "+TOTAL):""; } showBest();

  const shuffle=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1]);
  function buildLevelbar(){ const b=$("levelbar"); b.innerHTML="";
    for(let i=0;i<TOTAL;i++){ const d=document.createElement("div");
      d.className="dot"+(i<idx?" done":"")+(i===idx?" active":""); b.appendChild(d);} }

  function render(){
    answered=false; cur=queue[idx]; buildLevelbar();
    $("feedback").textContent=""; $("feedback").className="feedback";
    $("cat").textContent=cur.c; $("question").textContent=cur.q;
    const o=$("opts"); o.innerHTML="";
    shuffle([...cur.o]).forEach(t=>{ const b=document.createElement("button"); b.className="opt"; b.textContent=t;
      b.onclick=()=>answer(b,t); o.appendChild(b); });
  }
  function answer(btn,val){
    if(answered) return; answered=true;
    const fb=$("feedback");
    [...$("opts").children].forEach(b=>{ b.disabled=true; if(b.textContent===cur.a)b.classList.add("good"); });
    if(val===cur.a){ score++; streak++; $("score").textContent=score; $("streak").textContent=streak;
      fb.className="feedback good"; fb.textContent=(streak>=3?"🔥 ":"✅ ")+["Goed zo!","Knap!","Top!","Slim!"][Math.floor(Math.random()*4)]; }
    else { streak=0; $("streak").textContent=0; btn.classList.add("bad");
      fb.className="feedback bad"; fb.textContent="❌ Het was: "+cur.a; }
    idx++; buildLevelbar();
    setTimeout(()=>{ if(idx>=TOTAL) endGame(); else render(); }, 1200);
  }
  function startGame(){ queue=shuffle([...BANK]).slice(0,TOTAL); idx=0; score=0; streak=0;
    $("score").textContent=0; $("streak").textContent=0;
    $("startScreen").classList.add("hidden-el"); $("endScreen").classList.add("hidden-el"); $("playScreen").classList.remove("hidden-el");
    render(); }
  function endGame(){
    $("playScreen").classList.add("hidden-el"); $("endScreen").classList.remove("hidden-el");
    let rec=false; if(score>best){best=score;rec=true;try{localStorage.setItem(BEST_KEY,String(best));}catch(e){}} showBest();
    $("endText").innerHTML="Je had <b>"+score+" van de "+TOTAL+"</b> goed!"+(rec&&score>0?" 🏅 record!":"");
    $("endEmoji").textContent=score===TOTAL?"🏆":(score>=7?"🎉":"💪");
    $("endTitle").textContent=score===TOTAL?"Weetjesbaas!":(score>=7?"Goed gedaan!":"Blijf leren!");
  }
  $("startBtn").onclick=startGame; $("againBtn").onclick=startGame;
</script>
</body>
</html>
