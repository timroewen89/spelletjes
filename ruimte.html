<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeten &amp; Ruimte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* ── Space theme overrides ── */
  :root{
    --accent:#6366f1;
    --accent-dark:#4f46e5;
    --space:#0a0a2e;
    --space-mid:#0f1050;
    --star:#e8eaf6;
    --planet-label:#e8eaf6;
  }

  body{
    background:var(--space);
    color:var(--star);
    /* override the cream gradient from style.css */
    background-image:none;
  }

  .back{
    background:rgba(255,255,255,.08);
    color:var(--star);
    backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,.12);
  }
  .back:hover{ background:rgba(255,255,255,.16); }

  .top{ width:100%; max-width:560px; display:flex; justify-content:flex-end; gap:10px; margin-top:6px; }

  .pill{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    color:var(--star);
    backdrop-filter:blur(4px);
  }
  .pill .lbl{ color:rgba(232,234,246,.55); }
  .pill .val{ color:var(--star); }

  /* ── Card: porthole into space ── */
  .card{
    background:linear-gradient(160deg,#0d0e3f 0%,#080827 100%);
    border:1px solid rgba(99,102,241,.25);
    width:100%; max-width:560px;
    border-radius:30px;
    padding:22px 22px 28px;
    box-shadow:0 0 60px rgba(99,102,241,.18), 0 18px 40px rgba(0,0,0,.6);
    text-align:center;
    position:relative;
    overflow:hidden;
  }

  h1{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:2rem;
    color:#c7d2fe;
    margin-bottom:2px;
  }
  .sub{
    color:rgba(199,210,254,.65);
    font-weight:700;
    margin-top:4px;
    margin-bottom:10px;
    font-size:.95rem;
  }
  .best{
    color:#a5b4fc;
    font-weight:800;
    font-size:.88rem;
    margin-bottom:10px;
    min-height:1.1em;
  }

  /* ── Progress dots ── */
  .levelbar{
    display:flex;
    gap:7px;
    justify-content:center;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .dot{ width:11px; height:11px; border-radius:50%; background:rgba(255,255,255,.12); }
  .dot.done{ background:#6366f1; }
  .dot.active{ background:#a5b4fc; transform:scale(1.4); box-shadow:0 0 6px #a5b4fc; }

  /* ── Solar system canvas ── */
  #solarCanvas{
    display:block;
    margin:0 auto 8px;
    border-radius:16px;
    background:transparent;
    max-width:100%;
  }

  /* ── Question text ── */
  .qhint{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    color:#e0e7ff;
    font-size:1.15rem;
    margin:4px 0 14px;
    line-height:1.35;
  }

  /* ── Planet spotlight (for "which planet is this?") ── */
  #planetSpot{
    display:flex;
    justify-content:center;
    align-items:center;
    margin:6px auto 10px;
    min-height:90px;
  }

  /* ── Answer buttons ── */
  .opts{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .opt{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:1.25rem;
    color:#e0e7ff;
    background:rgba(99,102,241,.18);
    border:1.5px solid rgba(99,102,241,.35);
    border-radius:16px;
    padding:14px 8px;
    cursor:pointer;
    transition:transform .06s, background .1s;
    box-shadow:0 4px 0 rgba(0,0,0,.4);
  }
  .opt:hover:not(:disabled){ background:rgba(99,102,241,.34); }
  .opt:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.4); }
  .opt.good{
    background:rgba(34,197,94,.28);
    border-color:#22c55e;
    color:#86efac;
    box-shadow:0 4px 0 rgba(22,101,52,.5);
  }
  .opt.bad{
    background:rgba(239,68,68,.28);
    border-color:#ef4444;
    color:#fca5a5;
    box-shadow:0 4px 0 rgba(127,29,29,.5);
  }
  .opt:disabled{ cursor:default; }

  /* ── Feedback ── */
  .feedback{
    min-height:28px;
    font-family:'Fredoka',sans-serif;
    font-size:1.15rem;
    font-weight:600;
    margin-top:12px;
    color:rgba(255,255,255,.4);
  }
  .feedback.good{ color:#4ade80; }
  .feedback.bad{ color:#f87171; }

  /* ── Fact banner ── */
  .fact-banner{
    background:rgba(99,102,241,.15);
    border:1px solid rgba(99,102,241,.3);
    border-radius:12px;
    padding:8px 14px;
    font-size:.88rem;
    color:#a5b4fc;
    font-weight:700;
    margin-top:8px;
    min-height:0;
    line-height:1.4;
    display:none;
  }
  .fact-banner.visible{ display:block; }

  /* ── Start / End screens ── */
  .overlay-inner{
    padding:8px 0;
  }
  .overlay-inner .qhint{
    font-size:1.05rem;
    color:rgba(199,210,254,.75);
    margin-bottom:18px;
  }

  /* bigbtn in space theme */
  .bigbtn{
    background:var(--accent);
    box-shadow:0 6px 0 var(--accent-dark);
    font-size:1.15rem;
  }
  .bigbtn:active{ box-shadow:0 2px 0 var(--accent-dark); }

  /* end screen */
  #endEmoji{ font-size:3.4rem; }
  #endTitle{ color:#c7d2fe; margin:6px 0 4px; }

  /* ── Hint footer ── */
  .hint-foot{
    font-size:.8rem;
    color:rgba(199,210,254,.4);
    font-weight:700;
    margin-top:14px;
  }

  /* ── Twinkling stars background on card ── */
  .star-layer{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    border-radius:30px;
    z-index:0;
  }
  .card > *:not(.star-layer){ position:relative; z-index:1; }
</style>
</head>
<body>
  <a class="back" href="index.html">← Menu</a>

  <div class="top">
    <div class="pill"><span class="lbl">Vraag</span><span class="val" id="qNum">0/10</span></div>
    <div class="pill"><span class="lbl">Goed</span><span class="val" id="score">0</span></div>

  <div class="card">

    <div id="startScreen" class="overlay-inner">

      <button class="bigbtn" id="startBtn">Start 🚀</button>

<script>
(function(){
"use strict";

/* ================================================================
   PLANET DATA
   ================================================================ */
const PLANETS = [
  { name:"Mercurius", color:"#b5b5b5", ring:false, r:5,  orbitR:38,  moons:0,   fact:"Mercurius heeft geen atmosfeer en is heel heet overdag en koud 's nachts." },
  { name:"Venus",     color:"#e8c87a", ring:false, r:8,  orbitR:58,  moons:0,   fact:"Venus is de heetste planeet — heter dan Mercurius!" },
  { name:"Aarde",     color:"#4a90d9", ring:false, r:9,  orbitR:82,  moons:1,   fact:"De Aarde is de enige planeet waarop mensen (en dieren en planten) leven." },
  { name:"Mars",      color:"#c1440e", ring:false, r:6,  orbitR:110, moons:2,   fact:"Mars heeft de grootste vulkaan van het zonnestelsel: Olympus Mons." },
  { name:"Jupiter",   color:"#c88b3a", ring:false, r:22, orbitR:162, moons:95,  fact:"Jupiter is zo groot dat alle andere planeten er samen in passen!" },
  { name:"Saturnus",  color:"#e0c97f", ring:true,  r:18, orbitR:218, moons:146, fact:"De ringen van Saturnus zijn gemaakt van ijs en stenen." },
  { name:"Uranus",    color:"#7de8e8", ring:false, r:14, orbitR:268, moons:28,  fact:"Uranus draait op zijn kant, als een rollende bal." },
  { name:"Neptunus",  color:"#4b6bef", ring:false, r:12, orbitR:312, moons:16,  fact:"Op Neptunus waaien de sterkste stormen van het zonnestelsel." }
];

const SUN = { color:"#FFC83D", r:22 };

/* ================================================================
   QUESTION POOL (20+ questions)
   ================================================================ */
const QUESTION_POOL = [
  // --- Welke planeet is dit? (type: spot)
  ...PLANETS.map((p,i) => ({
    type:"spot",
    planetIdx:i,
    q:"Welke planeet is dit?",
    correct:p.name,
    opts: shuffle4(PLANETS.map(x=>x.name), p.name),
    fact: p.fact
  })),

  // --- Afstand tot de zon
  {
    type:"text",
    q:"Welke planeet staat het dichtst bij de zon?",
    correct:"Mercurius",
    opts:["Mercurius","Venus","Mars","Aarde"],
    fact:"Mercurius is de binnenste planeet — maar toch niet de heetste!"
  },
  {
    type:"text",
    q:"Welke planeet staat het verst van de zon af?",
    correct:"Neptunus",
    opts:["Saturnus","Uranus","Neptunus","Jupiter"],
    fact:"Neptunus is de buitenste planeet van ons zonnestelsel."
  },

  // --- Grootste / kleinste
  {
    type:"text",
    q:"Welke planeet is de grootste van het zonnestelsel?",
    correct:"Jupiter",
    opts:["Jupiter","Saturnus","Uranus","Neptunus"],
    fact:"Jupiter is meer dan 1.300 keer zo groot als de Aarde!"
  },
  {
    type:"text",
    q:"Welke planeet is de kleinste van de 8 planeten?",
    correct:"Mercurius",
    opts:["Mercurius","Mars","Venus","Aarde"],
    fact:"Mercurius is kleiner dan de maan van Saturnus, Titan."
  },

  // --- Manen
  {
    type:"text",
    q:"Hoeveel manen heeft Jupiter?",
    correct:"95",
    opts:["4","16","95","146"],
    fact:"Jupiter heeft 95 bekende manen. De vier grootste heten Io, Europa, Ganymedes en Callisto."
  },
  {
    type:"text",
    q:"Welke planeet heeft de meeste manen?",
    correct:"Saturnus",
    opts:["Jupiter","Saturnus","Uranus","Neptunus"],
    fact:"Saturnus heeft 146 bekende manen — meer dan elke andere planeet!"
  },
  {
    type:"text",
    q:"Hoeveel manen heeft de Aarde?",
    correct:"1",
    opts:["0","1","2","3"],
    fact:"De Aarde heeft één maan. Die heet gewoon 'de Maan'."
  },
  {
    type:"text",
    q:"Hoeveel manen heeft Mars?",
    correct:"2",
    opts:["0","1","2","4"],
    fact:"De twee maantjes van Mars heten Phobos en Deimos."
  },

  // --- Ringen
  {
    type:"text",
    q:"Welke planeet heeft de bekendste ringen?",
    correct:"Saturnus",
    opts:["Jupiter","Saturnus","Uranus","Neptunus"],
    fact:"De ringen van Saturnus zijn zichtbaar met een kleine telescoop."
  },

  // --- Bewoonbaar
  {
    type:"text",
    q:"Op welke planeet kunnen mensen leven?",
    correct:"Aarde",
    opts:["Mars","Venus","Aarde","Jupiter"],
    fact:"De Aarde is de enige planeet met vloeibaar water, lucht om te ademen en de juiste temperatuur."
  },

  // --- Kleur / uiterlijk
  {
    type:"text",
    q:"Welke planeet is rood van kleur?",
    correct:"Mars",
    opts:["Mars","Mercurius","Jupiter","Venus"],
    fact:"Mars is rood door roest (ijzeroxide) op het oppervlak."
  },
  {
    type:"text",
    q:"Welke planeet is lichtblauw van kleur?",
    correct:"Uranus",
    opts:["Neptunus","Uranus","Aarde","Venus"],
    fact:"Uranus is lichtblauw-groen door methaan in zijn atmosfeer."
  },

  // --- Bijzonderheden
  {
    type:"text",
    q:"Welke planeet heeft de grootste storm ter wereld: de Grote Rode Vlek?",
    correct:"Jupiter",
    opts:["Jupiter","Mars","Saturnus","Neptunus"],
    fact:"De Grote Rode Vlek is een storm die al honderden jaren woedt."
  },
  {
    type:"text",
    q:"Welke planeet draait op zijn kant?",
    correct:"Uranus",
    opts:["Venus","Mercurius","Uranus","Neptunus"],
    fact:"Uranus kantelt zo ver dat zijn polen de zon afwisselend voor 42 jaar beschijnt."
  },
  {
    type:"text",
    q:"Welke planeet is het heetst, ondanks dat hij verder van de zon staat dan Mercurius?",
    correct:"Venus",
    opts:["Venus","Aarde","Mars","Jupiter"],
    fact:"Venus heeft een dik wolkendek dat warmte vasthoudt — een soort super-broeikaseffect."
  },
  {
    type:"text",
    q:"Hoeveel planeten heeft ons zonnestelsel?",
    correct:"8",
    opts:["7","8","9","10"],
    fact:"Pluto was vroeger de 9e planeet, maar heet nu een 'dwergplaneet'."
  },
  {
    type:"text",
    q:"Hoe heet de ster in het midden van ons zonnestelsel?",
    correct:"De Zon",
    opts:["De Zon","Sirius","Polaris","Alpha Centauri"],
    fact:"De Zon is een ster van middelgrote grootte — er zijn veel grotere sterren!"
  },
  {
    type:"text",
    q:"Welke planeet is het verst weg én het koudst?",
    correct:"Neptunus",
    opts:["Saturnus","Uranus","Neptunus","Jupiter"],
    fact:"Op Neptunus is het gemiddeld −214°C. Brrr!"
  }
];

/* ================================================================
   HELPERS
   ================================================================ */
function shuffle(arr){
    return arr.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
}
function shuffle4(allNames, correct){
    // pick 3 wrong + correct, shuffle
    const wrong = shuffle(allNames.filter(n=>n!==correct)).slice(0,3);
    return shuffle([correct,...wrong]);
}

/* ================================================================
   STARS BACKGROUND
   ================================================================ */
function buildStars(){
    const layer = document.getElementById("starLayer");
    const canvas = document.createElement("canvas");
    canvas.width  = 560;
    canvas.height = 700;
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;opacity:0.55;";
    const ctx = canvas.getContext("2d");
    for(let i=0;i<160;i++){
        const x = Math.random()*560;
        const y = Math.random()*700;
        const r = Math.random()*1.4+0.3;
        ctx.beginPath();
        ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle = `rgba(232,234,246,${(Math.random()*.6+.3).toFixed(2)})`;
        ctx.fill();
    }
    layer.appendChild(canvas);
}

/* ================================================================
   DRAW SOLAR SYSTEM (decorative, on a canvas)
   ================================================================ */
function drawSolar(canvasEl, highlight){
    const W = canvasEl.width;
    const H = canvasEl.height;
    const ctx = canvasEl.getContext("2d");
    ctx.clearRect(0,0,W,H);

    // Sun position
    const sunX = 16;
    const sunY = H/2;

    // Draw orbits (faint arcs)
    PLANETS.forEach(p => {
        ctx.beginPath();
        ctx.setLineDash([3,5]);
        ctx.arc(sunX, sunY, p.orbitR * (W/340), 0, Math.PI*2);
        ctx.strokeStyle = "rgba(255,255,255,0.07)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);
    });

    // Draw Sun
    const sg = ctx.createRadialGradient(sunX,sunY,1,sunX,sunY,SUN.r*1.5);
    sg.addColorStop(0,"#fff8c0");
    sg.addColorStop(0.4,"#FFC83D");
    sg.addColorStop(1,"rgba(255,140,0,0)");
    ctx.beginPath();
    ctx.arc(sunX, sunY, SUN.r*1.5, 0, Math.PI*2);
    ctx.fillStyle = sg;
    ctx.fill();

    // Draw planets (placed on the right half of orbit, at top arc position)
    PLANETS.forEach((p,i) => {
        const scale = W/340;
        const orb = p.orbitR * scale;
        const px = sunX + orb;
        const py = sunY;

        // dim if not highlighted
        const alpha = (highlight === undefined || highlight === i) ? 1 : 0.35;

        if(p.ring){
            // ring behind
            ctx.beginPath();
            ctx.ellipse(px, py, p.r*2.4*scale, p.r*0.55*scale, 0, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(224,201,127,${alpha*0.7})`;
            ctx.lineWidth = 2.5*scale;
            ctx.stroke();
        }

        const grad = ctx.createRadialGradient(px-p.r*0.3*scale, py-p.r*0.3*scale, 0.5, px, py, p.r*scale*1.1);
        grad.addColorStop(0, lighten(p.color, 60));
        grad.addColorStop(0.55, p.color);
        grad.addColorStop(1, darken(p.color, 50));

        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(px, py, p.r*scale, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Label
        ctx.font = `bold ${Math.max(8, 9*scale)}px Fredoka, sans-serif`;
        ctx.fillStyle = highlight===i ? "#ffffff" : `rgba(232,234,246,${alpha})`;
        ctx.textAlign = "center";
        ctx.fillText(p.name, px, py + p.r*scale + 13*scale);

        ctx.globalAlpha = 1;
    });

    // "Zon" label
    ctx.font = `bold 8px Fredoka, sans-serif`;
    ctx.fillStyle = "rgba(255,200,61,0.8)";
    ctx.textAlign = "center";
    ctx.fillText("Zon", sunX, sunY + SUN.r*1.5 + 10);
}

function lighten(hex, amount){
    return adjustColor(hex, amount);
}
function darken(hex, amount){
    return adjustColor(hex, -amount);
}
function adjustColor(hex, amount){
    let r = parseInt(hex.slice(1,3),16);
    let g = parseInt(hex.slice(3,5),16);
    let b = parseInt(hex.slice(5,7),16);
    r = Math.min(255,Math.max(0,r+amount));
    g = Math.min(255,Math.max(0,g+amount));
    b = Math.min(255,Math.max(0,b+amount));
    return "#"+[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
}

/* ================================================================
   PLANET SPOTLIGHT CANVAS (for "spot" questions)
   ================================================================ */
function drawSpotlight(container, planetIdx){
    container.innerHTML = "";
    const p = PLANETS[planetIdx];
    const size = 100;
    const c = document.createElement("canvas");
    c.width  = size;
    c.height = size;
    c.setAttribute("aria-label", "Planeet om te raden");
    const ctx = c.getContext("2d");
    const cx = size/2, cy = size/2, r = 36;

    if(p.ring){
        ctx.beginPath();
        ctx.ellipse(cx, cy, r*2.1, r*0.5, 0, 0, Math.PI*2);
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 5;
        ctx.stroke();
    }

    const grad = ctx.createRadialGradient(cx-r*0.28, cy-r*0.28, 2, cx, cy, r*1.05);
    grad.addColorStop(0, lighten(p.color, 70));
    grad.addColorStop(0.5, p.color);
    grad.addColorStop(1, darken(p.color, 55));

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // glow
    const glow = ctx.createRadialGradient(cx,cy,r*0.7, cx,cy, r*1.6);
    glow.addColorStop(0,"rgba(0,0,0,0)");
    glow.addColorStop(1, hexToRgba(p.color, 0.22));
    ctx.beginPath();
    ctx.arc(cx,cy,r*1.6,0,Math.PI*2);
    ctx.fillStyle = glow;
    ctx.fill();

    container.appendChild(c);
}

function hexToRgba(hex, alpha){
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
}

/* ================================================================
   GAME STATE
   ================================================================ */
const TOTAL = 10;
const BEST_KEY = "ruimte_best";
let best = 0;
try{ best = parseInt(localStorage.getItem(BEST_KEY)||"0",10)||0; }catch(e){}

let gameQuestions = [];
let idx = 0, score = 0, answered = false;

const $ = id => document.getElementById(id);

function showBest(){
    $("best").textContent = best > 0 ? ("🏅 Beste: " + best + " / " + TOTAL) : "";
}
showBest();

/* ================================================================
   PICK 10 QUESTIONS FROM POOL
   ================================================================ */
function pickQuestions(){
    // Always include at least 3 "spot" types and 7 text questions, shuffled
    const spotQs = shuffle(QUESTION_POOL.filter(q=>q.type==="spot"));
    const textQs = shuffle(QUESTION_POOL.filter(q=>q.type==="text"));
    const selected = [...spotQs.slice(0,3), ...textQs.slice(0,7)];
    // Deep-copy and shuffle opts for text questions so answer position varies each game
    return shuffle(selected).slice(0,TOTAL).map(q => {
        if(q.type === "text"){
            return Object.assign({}, q, { opts: shuffle(q.opts.slice()) });
        }
        return q;
    });
}

/* ================================================================
   RENDER
   ================================================================ */
function buildLevelbar(){
    const bar = $("levelbar");
    bar.innerHTML = "";
    for(let i=0;i<TOTAL;i++){
        const d = document.createElement("div");
        d.className = "dot" + (i<idx?" done":"") + (i===idx?" active":"");
        bar.appendChild(d);
    }
}

function render(){
    answered = false;
    buildLevelbar();
    $("feedback").textContent = "";
    $("feedback").className = "feedback";
    $("factBanner").className = "fact-banner";
    $("factBanner").textContent = "";

    const q = gameQuestions[idx];
    $("qNum").textContent = (idx+1) + "/" + TOTAL;

    // Solar system — highlight if spot question
    const solar = $("solarCanvas2");
    const highlightIdx = q.type==="spot" ? q.planetIdx : undefined;
    drawSolar(solar, highlightIdx);

    // Planet spotlight
    const spot = $("planetSpot");
    if(q.type==="spot"){
        drawSpotlight(spot, q.planetIdx);
    } else {
        spot.innerHTML = "";
    }

    // Question text
    $("qText").textContent = q.q;

    // Options
    const opts = $("opts");
    opts.innerHTML = "";
    q.opts.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "opt";
        btn.textContent = opt;
        btn.onclick = () => answer(btn, opt, q);
        opts.appendChild(btn);
    });
}

function answer(btn, val, q){
    if(answered) return;
    answered = true;

    // Disable all + mark correct
    [...$("opts").children].forEach(b => {
        b.disabled = true;
        if(b.textContent === q.correct) b.classList.add("good");
    });

    const fb = $("feedback");
    if(val === q.correct){
        score++;
        $("score").textContent = score;
        fb.className = "feedback good";
        fb.textContent = "✅ Goed zo!";
    } else {
        btn.classList.add("bad");
        fb.className = "feedback bad";
        fb.textContent = "❌ Het is: " + q.correct;
    }

    // Show fact
    if(q.fact){
        const fbt = $("factBanner");
        fbt.textContent = "🔭 " + q.fact;
        fbt.className = "fact-banner visible";
    }

    idx++;
    buildLevelbar();
    setTimeout(() => {
        if(idx >= TOTAL) endGame();
        else render();
    }, 2000);
}

/* ================================================================
   GAME FLOW
   ================================================================ */
function startGame(){
    idx = 0; score = 0;
    $("score").textContent = 0;
    $("qNum").textContent = "1/" + TOTAL;
    gameQuestions = pickQuestions();
    $("startScreen").classList.add("hidden-el");
    $("endScreen").classList.add("hidden-el");
    $("playScreen").classList.remove("hidden-el");
    render();
}

function endGame(){
    $("playScreen").classList.add("hidden-el");
    $("endScreen").classList.remove("hidden-el");

    let rec = false;
    if(score > best){
        best = score; rec = true;
        try{ localStorage.setItem(BEST_KEY, String(best)); }catch(e){}
    }
    showBest();

    $("endEmoji").textContent = score===TOTAL ? "🏆" : (score>=7 ? "🎉" : "💪");
    $("endTitle").textContent = score===TOTAL ? "Ruimtekenner!" : (score>=7 ? "Goed gedaan!" : "Blijf oefenen!");
    $("endText").innerHTML = "Je had <b>" + score + " van de " + TOTAL + "</b> goed!" + (rec && score>0 ? " 🏅 nieuw record!" : "");
}

/* ================================================================
   INIT
   ================================================================ */
buildStars();
// Draw solar system on start screen
drawSolar($("solarCanvas"));

$("startBtn").onclick = startGame;
$("againBtn").onclick = startGame;

// Progress update on start screen
buildLevelbar();

})();
</script>
</body>
</html>
