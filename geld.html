<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slim met geld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{--violet:#2fa84f;--violet-dark:#218038;}
  .top{width:100%;max-width:560px;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}
  .card{background:#fff;width:100%;max-width:560px;border-radius:30px;padding:26px 24px 30px;box-shadow:0 18px 40px rgba(43,45,107,.12);text-align:center;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
  .sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
  .best{color:var(--violet-dark);font-weight:800;font-size:.9rem;margin-bottom:12px;min-height:1.1em;}
  .levelbar{display:flex;gap:7px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--surface2);}
  .dot.done{background:var(--mint);}
  .dot.active{background:var(--violet);transform:scale(1.3);}
  .money{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;min-height:80px;margin-bottom:14px;}
  .munt{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;color:#5a4500;box-shadow:0 4px 0 rgba(0,0,0,.18);}
  .munt.koper{background:radial-gradient(circle at 35% 30%,#e7a76b,#c97f3f);}
  .munt.goud{background:radial-gradient(circle at 35% 30%,#ffe08a,#e0b341);}
  .munt.euro{background:radial-gradient(circle at 35% 30%,#fff0b8,#cbb26b);color:#4a4a2a;border:3px solid #e7a76b;}
  .biljet{width:88px;height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-family:'Fredoka',sans-serif;font-weight:600;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.18);}
  .biljet.v5{background:#9aa0d6;}
  .biljet.v10{background:#e2756b;}
  .biljet.v20{background:#5fae34;}
  .q{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.25rem;color:var(--ink);margin-bottom:14px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.4rem;color:var(--ink);background:var(--surface);
    border:none;border-radius:16px;padding:16px 0;cursor:pointer;box-shadow:0 5px 0 var(--surface2);}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);}
  .opt.good{background:var(--good);color:#fff;box-shadow:0 5px 0 #11823b;}
  .opt.bad{background:var(--bad);color:#fff;box-shadow:0 5px 0 #a81d1d;}
  .feedback{min-height:30px;font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:600;margin-top:14px;}
  .feedback.good{color:var(--good);}
  .feedback.bad{color:var(--bad);}
</style>
</head>
<body>
  <a class="back" href="index.html">← Menu</a>
  <div class="top"><div class="pill"><span class="lbl">Goed</span><span class="val" id="score">0</span></div></div>
  <div class="card">
    <h1>💰 Slim met geld</h1>
    <p class="sub">Hoeveel geld zie je in totaal?</p>
    <div class="best" id="best"></div>
    <div class="levelbar" id="levelbar"></div>

    <div id="startScreen">
      <p class="q">Tel de munten en biljetten bij elkaar op. 10 vragen!</p>
      <button class="bigbtn" id="startBtn">Start 🚀</button>
    </div>

    <div id="playScreen" class="hidden-el">
      <div class="money" id="money"></div>
      <div class="q">Hoeveel is dit samen?</div>
      <div class="opts" id="opts"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div id="endScreen" class="hidden-el">
      <div style="font-size:3.2rem" id="endEmoji">🎉</div>
      <h1 id="endTitle">Goed gedaan!</h1>
      <p class="sub" id="endText"></p>
      <button class="bigbtn" id="againBtn">Nog een keer 🔁</button>
    </div>
  </div>

<script>
  const TOTAL=10, BEST_KEY="geld_best";
  let best=0; try{best=parseInt(localStorage.getItem(BEST_KEY)||"0",10)||0;}catch(e){}
  let idx=0, score=0, cur=null, answered=false;
  const $=id=>document.getElementById(id);
  function showBest(){ $("best").textContent=best>0?("🏅 Beste: "+best+" / "+TOTAL):""; } showBest();

  const COINS=[5,10,20,50,100,200];                 // centen
  const NOTES=[500,1000,2000];
  const shuffle=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1]);
  const pad=n=>(n<10?"0":"")+n;
  function fmt(c){ if(c<100) return c+" cent"; const e=Math.floor(c/100), r=c%100; return r===0?("€"+e):("€"+e+","+pad(r)); }

  function muntEl(c){
    const d=document.createElement("div");
    if(c>=500){ d.className="biljet "+(c===500?"v5":c===1000?"v10":"v20"); d.textContent="€"+(c/100); }
    else { d.className="munt "+(c<100?(c<=20?"koper":"goud"):"euro"); d.textContent=c<100?(c+"ct"):("€"+(c/100)); }
    return d;
  }
  function makeQuestion(){
    const useNote=Math.random()<0.5;
    const items=[]; const count=2+Math.floor(Math.random()*3); // 2..4
    for(let i=0;i<count;i++){ const pool=(useNote && i===0)?NOTES:COINS; items.push(pool[Math.floor(Math.random()*pool.length)]); }
    const total=items.reduce((a,b)=>a+b,0);
    const set=new Set([total]); const deltas=[5,10,20,25,50,100,200];
    let g=0; while(set.size<4 && g++<60){ const dl=deltas[Math.floor(Math.random()*deltas.length)]*(Math.random()<.5?1:-1); const v=total+dl; if(v>0) set.add(v); }
    cur={items,total,opts:shuffle([...set])};
  }
  function buildLevelbar(){ const b=$("levelbar"); b.innerHTML="";
    for(let i=0;i<TOTAL;i++){ const d=document.createElement("div"); d.className="dot"+(i<idx?" done":"")+(i===idx?" active":""); b.appendChild(d);} }
  function render(){
    answered=false; buildLevelbar(); $("feedback").textContent=""; $("feedback").className="feedback";
    makeQuestion();
    const mon=$("money"); mon.innerHTML=""; cur.items.forEach(c=>mon.appendChild(muntEl(c)));
    const o=$("opts"); o.innerHTML="";
    cur.opts.forEach(v=>{ const b=document.createElement("button"); b.className="opt"; b.textContent=fmt(v); b.onclick=()=>answer(b,v); o.appendChild(b); });
  }
  function answer(btn,val){
    if(answered) return; answered=true; const fb=$("feedback");
    [...$("opts").children].forEach(b=>{ b.disabled=true; if(b.textContent===fmt(cur.total))b.classList.add("good"); });
    if(val===cur.total){ score++; $("score").textContent=score; fb.className="feedback good"; fb.textContent="✅ Goed geteld!"; }
    else { btn.classList.add("bad"); fb.className="feedback bad"; fb.textContent="❌ Het was "+fmt(cur.total); }
    idx++; buildLevelbar();
    setTimeout(()=>{ if(idx>=TOTAL) endGame(); else render(); }, 1150);
  }
  function startGame(){ idx=0; score=0; $("score").textContent=0;
    $("startScreen").classList.add("hidden-el"); $("endScreen").classList.add("hidden-el"); $("playScreen").classList.remove("hidden-el"); render(); }
  function endGame(){
    $("playScreen").classList.add("hidden-el"); $("endScreen").classList.remove("hidden-el");
    let rec=false; if(score>best){best=score;rec=true;try{localStorage.setItem(BEST_KEY,String(best));}catch(e){}} showBest();
    $("endEmoji").textContent=score===TOTAL?"🏆":(score>=7?"🎉":"💪");
    $("endTitle").textContent=score===TOTAL?"Geldwonder!":(score>=7?"Goed gedaan!":"Blijf oefenen!");
    $("endText").innerHTML="Je had <b>"+score+" van de "+TOTAL+"</b> goed!"+(rec&&score>0?" 🏅 record!":"");
  }
  $("startBtn").onclick=startGame; $("againBtn").onclick=startGame;
</script>
</body>
</html>
