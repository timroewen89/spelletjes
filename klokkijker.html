<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klokkijker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{--violet:#5b6bd6;--violet-dark:#4655ad;}
  .top{width:100%;max-width:560px;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}
  .card{background:#fff;width:100%;max-width:560px;border-radius:30px;padding:26px 24px 30px;box-shadow:0 18px 40px rgba(43,45,107,.12);text-align:center;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
  .sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
  .best{color:var(--violet-dark);font-weight:800;font-size:.9rem;margin-bottom:12px;min-height:1.1em;}
  .levelbar{display:flex;gap:7px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--surface2);}
  .dot.done{background:var(--mint);}
  .dot.active{background:var(--violet);transform:scale(1.3);}
  .clock{width:230px;height:230px;margin:4px auto 6px;}
  .qhint{font-family:'Fredoka',sans-serif;font-weight:600;color:var(--ink);font-size:1.15rem;margin:6px 0 14px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.5rem;color:var(--ink);background:var(--surface);
    border:none;border-radius:16px;padding:16px 0;cursor:pointer;box-shadow:0 5px 0 var(--surface2);transition:transform .06s;}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);}
  .opt.good{background:var(--good);color:#fff;box-shadow:0 5px 0 #11823b;}
  .opt.bad{background:var(--bad);color:#fff;box-shadow:0 5px 0 #a81d1d;}
  .opt:disabled{cursor:default;}
  .feedback{min-height:30px;font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:600;margin-top:14px;}
  .feedback.good{color:var(--good);}
  .feedback.bad{color:var(--bad);}
</style>
</head>
<body>
  <a class="back" href="index.html">← Menu</a>
  <div class="top">
    <div class="pill"><span class="lbl">Goed</span><span class="val" id="score">0</span></div>
  </div>
  <div class="card">
    <h1>🕐 Klokkijker</h1>
    <p class="sub">Hoe laat is het op de klok?</p>
    <div class="best" id="best"></div>
    <div class="levelbar" id="levelbar"></div>

    <div id="startScreen">
      <p class="qhint">Leer de klok lezen — van hele uren tot vijf minuten!</p>
      <button class="bigbtn" id="startBtn">Start 🚀</button>
    </div>

    <div id="playScreen" class="hidden-el">
      <svg class="clock" id="clock" viewBox="0 0 200 200" aria-hidden="true"></svg>
      <div class="qhint">Hoe laat is het?</div>
      <div class="opts" id="opts"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div id="endScreen" class="hidden-el">
      <div style="font-size:3.4rem" id="endEmoji">🎉</div>
      <h1 id="endTitle">Goed gedaan!</h1>
      <p class="sub" id="endText"></p>
      <button class="bigbtn" id="againBtn">Nog een keer 🔁</button>
    </div>
  </div>

<script>
  const TOTAL=10, BEST_KEY="klokkijker_best";
  let best=0; try{best=parseInt(localStorage.getItem(BEST_KEY)||"0",10)||0;}catch(e){}
  let idx=0, score=0, cur=null, answered=false;
  const $=id=>document.getElementById(id);
  function showBest(){ $("best").textContent = best>0?("🏅 Beste: "+best+" / "+TOTAL):""; } showBest();

  function levelFor(i){ return i<3?1 : i<6?2 : i<8?3 : 4; }   // moeilijker per vraag
  const pad=m=>(m<10?"0":"")+m;
  const fmt=(h,m)=>h+":"+pad(m);

  function minuteForLevel(L){
    if(L===1) return 0;
    if(L===2) return [0,30][Math.floor(Math.random()*2)];
    if(L===3) return [0,15,30,45][Math.floor(Math.random()*4)];
    return Math.floor(Math.random()*12)*5;
  }
  function makeQuestion(){
    const L=levelFor(idx);
    const h=1+Math.floor(Math.random()*12);
    const m=minuteForLevel(L);
    const correct=fmt(h,m);
    const set=new Set([correct]);
    let guard=0;
    while(set.size<4 && guard++<50){
      let dh=h, dm=m;
      if(Math.random()<0.5){ dh=1+((h-1+ (Math.random()<.5?1:11) )%12); }
      else { const opts=L===1?[0]:(L===2?[0,30]:(L===3?[0,15,30,45]:[0,5,10,15,20,25,30,35,40,45,50,55]));
        dm=opts[Math.floor(Math.random()*opts.length)]; if(L===1) dh=1+((h-1+(Math.random()<.5?1:11))%12); }
      set.add(fmt(dh,dm));
    }
    const opts=[...set].sort(()=>Math.random()-0.5);
    cur={h,m,correct,opts};
  }

  function drawClock(h,m){
    const cx=100,cy=100, parts=[];
    parts.push('<circle cx="100" cy="100" r="94" fill="#fff" stroke="#EBE7FB" stroke-width="6"/>');
    parts.push('<circle cx="100" cy="100" r="88" fill="none" stroke="#F3F1FB" stroke-width="2"/>');
    for(let n=1;n<=12;n++){
      const a=(n*30-90)*Math.PI/180;
      const tx=cx+Math.cos(a)*72, ty=cy+Math.sin(a)*72;
      parts.push('<text x="'+tx+'" y="'+(ty+6)+'" text-anchor="middle" font-family="Fredoka" font-weight="600" font-size="16" fill="#2B2D6B">'+n+'</text>');
      const ax=cx+Math.cos(a)*86, ay=cy+Math.sin(a)*86, bx=cx+Math.cos(a)*80, by=cy+Math.sin(a)*80;
      parts.push('<line x1="'+ax+'" y1="'+ay+'" x2="'+bx+'" y2="'+by+'" stroke="#C9C3E6" stroke-width="2"/>');
    }
    const ma=(m*6-90)*Math.PI/180;        // minuutwijzer
    const ha=((h%12)*30+m*0.5-90)*Math.PI/180; // uurwijzer
    parts.push('<line x1="100" y1="100" x2="'+(cx+Math.cos(ha)*46)+'" y2="'+(cy+Math.sin(ha)*46)+'" stroke="#4655ad" stroke-width="7" stroke-linecap="round"/>');
    parts.push('<line x1="100" y1="100" x2="'+(cx+Math.cos(ma)*70)+'" y2="'+(cy+Math.sin(ma)*70)+'" stroke="#5b6bd6" stroke-width="4.5" stroke-linecap="round"/>');
    parts.push('<circle cx="100" cy="100" r="6" fill="#2B2D6B"/>');
    $("clock").innerHTML=parts.join("");
  }

  function buildLevelbar(){ const b=$("levelbar"); b.innerHTML="";
    for(let i=0;i<TOTAL;i++){ const d=document.createElement("div");
      d.className="dot"+(i<idx?" done":"")+(i===idx?" active":""); b.appendChild(d);} }

  function render(){
    answered=false; buildLevelbar(); $("feedback").textContent=""; $("feedback").className="feedback";
    makeQuestion(); drawClock(cur.h,cur.m);
    const o=$("opts"); o.innerHTML="";
    cur.opts.forEach(t=>{ const b=document.createElement("button"); b.className="opt"; b.textContent=t;
      b.onclick=()=>answer(b,t); o.appendChild(b); });
  }
  function answer(btn,val){
    if(answered) return; answered=true;
    const fb=$("feedback");
    [...$("opts").children].forEach(b=>{ b.disabled=true; if(b.textContent===cur.correct)b.classList.add("good"); });
    if(val===cur.correct){ score++; $("score").textContent=score; fb.className="feedback good"; fb.textContent="✅ Goed zo!"; }
    else { btn.classList.add("bad"); fb.className="feedback bad"; fb.textContent="❌ Het was "+cur.correct; }
    idx++; buildLevelbar();
    setTimeout(()=>{ if(idx>=TOTAL) endGame(); else render(); }, 1100);
  }
  function startGame(){ idx=0; score=0; $("score").textContent=0;
    $("startScreen").classList.add("hidden-el"); $("endScreen").classList.add("hidden-el"); $("playScreen").classList.remove("hidden-el");
    render(); }
  function endGame(){
    $("playScreen").classList.add("hidden-el"); $("endScreen").classList.remove("hidden-el");
    let rec=false; if(score>best){best=score;rec=true;try{localStorage.setItem(BEST_KEY,String(best));}catch(e){}} showBest();
    $("endText").innerHTML="Je had <b>"+score+" van de "+TOTAL+"</b> goed!"+(rec&&score>0?" 🏅 record!":"");
    $("endEmoji").textContent=score===TOTAL?"🏆":(score>=7?"🎉":"💪");
    $("endTitle").textContent=score===TOTAL?"Klokmeester!":(score>=7?"Goed gedaan!":"Blijf oefenen!");
  }
  $("startBtn").onclick=startGame; $("againBtn").onclick=startGame;
</script>
</body>
</html>
