<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engels Avontuur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--violet:#a855f7;--violet-dark:#9333ea;}

.card{
  background:#fff;width:100%;max-width:540px;
  border-radius:30px;padding:26px 22px 32px;
  box-shadow:0 18px 40px rgba(43,45,107,.12);
  text-align:center;
}

h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
.sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
.best{color:var(--violet-dark);font-weight:800;font-size:.9rem;margin-bottom:8px;min-height:1em;}

.levelbar{display:flex;gap:7px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;}
.dot{width:13px;height:13px;border-radius:50%;background:var(--surface2);}
.dot.done{background:var(--mint);}
.dot.active{background:var(--violet);transform:scale(1.3);}

.lv-badge{
  display:inline-block;color:#fff;
  font-family:'Fredoka',sans-serif;font-size:.9rem;font-weight:600;
  border-radius:999px;padding:5px 16px;margin-bottom:12px;
}

.pic-box{
  background:var(--surface);border-radius:22px;
  padding:14px 18px;margin:4px auto 10px;
  display:inline-block;min-width:130px;
}
.pic-e{font-size:4.5rem;line-height:1;display:block;}
.pic-e.pop{animation:pop .3s ease;}
.nl-hint{font-family:'Fredoka',sans-serif;font-size:1.15rem;font-weight:600;
          color:var(--ink-soft);margin-top:6px;}

.q-txt{font-weight:700;font-size:1rem;color:var(--ink);margin:8px 0 12px;}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opt{
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.2rem;
  color:var(--ink);background:var(--surface);border:none;border-radius:16px;
  padding:14px 8px;cursor:pointer;
  box-shadow:0 5px 0 var(--surface2);transition:transform .06s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.opt:hover:not(:disabled){background:var(--surface2);}
.opt:active:not(:disabled){transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);}
.opt.good{background:var(--good)!important;color:#fff!important;box-shadow:0 5px 0 #11823b!important;}
.opt.bad{background:var(--bad)!important;color:#fff!important;box-shadow:0 5px 0 #a81d1d!important;}
.opt .oe{font-size:1.7rem;}

.feedback{
  min-height:32px;font-family:'Fredoka',sans-serif;font-size:1.15rem;
  font-weight:700;margin-top:10px;
}
.feedback.good{color:var(--good);}
.feedback.bad{color:var(--bad);}

.streak-pill{background:linear-gradient(180deg,#fef3c7,#fde68a);}
.streak-pill .val{color:#92400e;}

.big-e{font-size:4rem;margin:6px 0;}
.end-title{font-family:'Fredoka',sans-serif;font-size:1.75rem;font-weight:700;color:var(--violet-dark);}
.star-row{font-size:2.5rem;margin:8px 0;letter-spacing:.05em;}
.end-msg{font-weight:700;color:var(--ink-soft);font-size:.95rem;margin-bottom:18px;}
.score-txt{font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:700;
            color:var(--ink);margin-bottom:14px;}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0 18px;}
.chip{background:var(--surface);border-radius:14px;padding:7px 14px;
       font-weight:700;font-size:.9rem;color:var(--ink);}

.lv-recap{
  display:flex;flex-direction:column;gap:6px;
  margin:10px 0 18px;text-align:left;
}
.lv-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border-radius:12px;padding:8px 14px;
  font-weight:700;font-size:.9rem;color:var(--ink);
}
.lv-row-stars{font-size:1.1rem;letter-spacing:.02em;}

@keyframes pop{0%{transform:scale(.6);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.shake{animation:shake .35s ease;}
</style>
</head>
<body>

<a class="back" href="index.html">← Menu</a>
<div class="top" id="topBar" style="display:none">
  <div class="pill"><span class="lbl">Score</span><span class="val" id="totalScore">0</span></div>
  <div class="pill streak-pill"><span class="lbl">Level</span><span class="val" id="lvPill">1/5</span></div>
</div>
<div class="card" id="card"></div>

<script>
/* ===== GAME DATA ===== */
const LEVELS = [
  {
    id:1, name:"Level 1", label:"🐾 Dieren",
    clr:"#a855f7",
    hint:"Wat is het Engelse woord?",
    showNL:true, showOptE:true,
    qs:[
      {e:"🐱",nl:"kat",    en:"cat",    opts:[{w:"cat",e:"🐱"},{w:"dog",e:"🐶"},{w:"fish",e:"🐟"},{w:"bird",e:"🐦"}]},
      {e:"🐶",nl:"hond",   en:"dog",    opts:[{w:"cat",e:"🐱"},{w:"dog",e:"🐶"},{w:"frog",e:"🐸"},{w:"rabbit",e:"🐰"}]},
      {e:"🐟",nl:"vis",    en:"fish",   opts:[{w:"fish",e:"🐟"},{w:"bird",e:"🐦"},{w:"horse",e:"🐴"},{w:"frog",e:"🐸"}]},
      {e:"🐦",nl:"vogel",  en:"bird",   opts:[{w:"cat",e:"🐱"},{w:"fish",e:"🐟"},{w:"bird",e:"🐦"},{w:"rabbit",e:"🐰"}]},
      {e:"🐸",nl:"kikker", en:"frog",   opts:[{w:"rabbit",e:"🐰"},{w:"horse",e:"🐴"},{w:"frog",e:"🐸"},{w:"bear",e:"🐻"}]},
      {e:"🐻",nl:"beer",   en:"bear",   opts:[{w:"bear",e:"🐻"},{w:"lion",e:"🦁"},{w:"tiger",e:"🐯"},{w:"wolf",e:"🐺"}]},
      {e:"🐰",nl:"konijn", en:"rabbit", opts:[{w:"cat",e:"🐱"},{w:"rabbit",e:"🐰"},{w:"mouse",e:"🐭"},{w:"dog",e:"🐶"}]},
      {e:"🦁",nl:"leeuw",  en:"lion",   opts:[{w:"tiger",e:"🐯"},{w:"lion",e:"🦁"},{w:"bear",e:"🐻"},{w:"wolf",e:"🐺"}]},
    ]
  },
  {
    id:2, name:"Level 2", label:"🍎 Eten & Drinken",
    clr:"#22c55e",
    hint:"Wat is het Engelse woord?",
    showNL:true, showOptE:false,
    qs:[
      {e:"🍎",nl:"appel",       en:"apple",      opts:["apple","banana","orange","grape"]},
      {e:"🍌",nl:"banaan",      en:"banana",     opts:["apple","banana","orange","grape"]},
      {e:"🍊",nl:"sinaasappel", en:"orange",     opts:["apple","orange","lemon","mango"]},
      {e:"🍞",nl:"brood",       en:"bread",      opts:["bread","cake","rice","pasta"]},
      {e:"🥛",nl:"melk",        en:"milk",       opts:["water","juice","milk","tea"]},
      {e:"🥚",nl:"ei",          en:"egg",        opts:["egg","bread","cheese","butter"]},
      {e:"🎂",nl:"taart",       en:"cake",       opts:["pie","cake","cookie","bread"]},
      {e:"🍓",nl:"aardbei",     en:"strawberry", opts:["cherry","strawberry","raspberry","blueberry"]},
    ]
  },
  {
    id:3, name:"Level 3", label:"👁️ Lichaamsdelen",
    clr:"#0ea5e9",
    hint:"What is this body part?",
    showNL:false, showOptE:false,
    qs:[
      {e:"👁️",en:"eye",   opts:["eye","ear","nose","mouth"]},
      {e:"👂",en:"ear",   opts:["eye","ear","nose","hand"]},
      {e:"👃",en:"nose",  opts:["eye","ear","nose","foot"]},
      {e:"👄",en:"mouth", opts:["eye","mouth","tooth","lip"]},
      {e:"✋",en:"hand",  opts:["foot","hand","arm","leg"]},
      {e:"🦶",en:"foot",  opts:["foot","hand","arm","knee"]},
      {e:"💪",en:"arm",   opts:["arm","leg","foot","hand"]},
      {e:"🦵",en:"leg",   opts:["arm","leg","foot","knee"]},
    ]
  },
  {
    id:4, name:"Level 4", label:"🏃 Doen & Voelen",
    clr:"#f97316",
    hint:"Choose the right word!",
    showNL:false, showOptE:false,
    qs:[
      {e:"🏃",q:"What is he doing?",   en:"run",   opts:["run","jump","swim","fly"]},
      {e:"🦘",q:"What can it do?",     en:"jump",  opts:["run","jump","swim","fly"]},
      {e:"🏊",q:"What is she doing?",  en:"swim",  opts:["run","jump","swim","walk"]},
      {e:"🐦",q:"What can it do?",     en:"fly",   opts:["run","jump","swim","fly"]},
      {e:"🐘",q:"An elephant is...",   en:"big",   opts:["big","small","tall","short"]},
      {e:"🐭",q:"A mouse is...",       en:"small", opts:["big","small","tall","short"]},
      {e:"😊",q:"This face is...",     en:"happy", opts:["happy","sad","angry","scared"]},
      {e:"😢",q:"This face is...",     en:"sad",   opts:["happy","sad","angry","scared"]},
    ]
  },
  {
    id:5, name:"Level 5", label:"💬 Zinnen",
    clr:"#e11d48",
    hint:"",
    showNL:false, showOptE:false,
    qs:[
      {e:"🐶",q:"A dog says...",              en:"woof",      opts:["woof","meow","moo","oink"]},
      {e:"🐄",q:"A cow says...",              en:"moo",       opts:["woof","meow","moo","oink"]},
      {e:"🌙",q:"Opposite of 'day':",         en:"night",     opts:["night","dark","sleep","moon"]},
      {e:"🔥",q:"Opposite of 'cold':",        en:"hot",       opts:["hot","warm","cool","dry"]},
      {e:"🐱",q:"A baby cat is called a...",  en:"kitten",    opts:["kitten","puppy","chick","calf"]},
      {e:"🐶",q:"A baby dog is called a...",  en:"puppy",     opts:["kitten","puppy","chick","lamb"]},
      {e:"📚",q:"You use it to read:",        en:"book",      opts:["book","pen","ruler","bag"]},
      {e:"📅",q:"After Tuesday comes...",     en:"Wednesday", opts:["Wednesday","Thursday","Friday","Monday"]},
    ]
  }
];

const GOOD_MSG = ["Great! 🌟","Correct! ✅","Awesome! 🎉","Well done! 👏","Perfect! ⭐","Brilliant! 💫","Yes! 🙌"];

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function calcStars(ok,total){
  if(ok/total>=7/8) return 3;
  if(ok/total>=5/8) return 2;
  if(ok/total>=3/8) return 1;
  return 0;
}
function starStr(n){ return '⭐'.repeat(n)+'☆'.repeat(3-n); }

/* ----- STATE ----- */
const ST={lv:0,qi:0,lvOk:0,total:0,lvStars:[],bestTotal:0};
let locked=false;

const card=document.getElementById('card');
const topBar=document.getElementById('topBar');

function loadBest(){ ST.bestTotal=+localStorage.getItem('ea-best')||0; }
function saveBest(){ if(ST.total>ST.bestTotal){ST.bestTotal=ST.total;localStorage.setItem('ea-best',ST.total);} }

function updatePills(){
  document.getElementById('totalScore').textContent=ST.total;
  document.getElementById('lvPill').textContent=`${ST.lv+1}/5`;
}

/* ----- SCREENS ----- */

function showStart(){
  loadBest();
  topBar.style.display='none';
  card.innerHTML=`
    <h1>🇬🇧 Engels Avontuur</h1>
    <p class="sub">Leer Engelse woorden — 5 levels, steeds moeilijker!</p>
    ${ST.bestTotal?`<div class="best">Beste score: ${ST.bestTotal}/40</div>`:'<div class="best"></div>'}
    <div style="font-size:3rem;margin:8px 0">✈️ 🌍 📚</div>
    <div class="chip-row">
      <div class="chip">🐾 Dieren</div>
      <div class="chip">🍎 Eten</div>
      <div class="chip">👁️ Lichaam</div>
      <div class="chip">🏃 Acties</div>
      <div class="chip">💬 Zinnen</div>
    </div>
    <p style="color:var(--ink-soft);font-weight:700;font-size:.9rem;margin-bottom:20px">
      8 vragen per level &middot; Word een echte Engelse kampioen! 🏆
    </p>
    <button class="bigbtn" onclick="startGame()">Start 🚀</button>
  `;
}

function startGame(){
  ST.lv=0; ST.qi=0; ST.lvOk=0; ST.total=0; ST.lvStars=[];
  locked=false;
  topBar.style.display='flex';
  showQ();
}

function showQ(){
  const lv=LEVELS[ST.lv];
  const q=lv.qs[ST.qi];
  const rawOpts=q.opts.map(o=>typeof o==='string'?{w:o,e:''}:{...o});
  const opts=shuffle(rawOpts);

  const dots=lv.qs.map((_,i)=>{
    const cls=i<ST.qi?'done':i===ST.qi?'active':'';
    return `<div class="dot ${cls}"></div>`;
  }).join('');

  const nlPart=lv.showNL&&q.nl?`<div class="nl-hint">🇳🇱 ${q.nl}</div>`:'';
  const qLine=q.q||lv.hint;

  const optHtml=opts.map(o=>{
    const eSpan=lv.showOptE&&o.e?`<span class="oe">${o.e}</span>`:'';
    return `<button class="opt" data-word="${o.w}" onclick="checkAns(this,'${o.w}')">${eSpan}${o.w}</button>`;
  }).join('');

  card.innerHTML=`
    <div class="lv-badge" style="background:${lv.clr}">${lv.name} &middot; ${lv.label}</div>
    <div class="levelbar">${dots}</div>
    <div class="pic-box"><span class="pic-e pop">${q.e}</span>${nlPart}</div>
    ${qLine?`<div class="q-txt">${qLine}</div>`:''}
    <div class="opts" id="opts">${optHtml}</div>
    <div class="feedback" id="fb"></div>
  `;

  locked=false;
  updatePills();
}

function checkAns(btn, chosen){
  if(locked) return;
  locked=true;

  const lv=LEVELS[ST.lv];
  const correct=lv.qs[ST.qi].en;
  const ok=chosen===correct;

  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);

  if(ok){
    btn.classList.add('good');
    ST.lvOk++;
    ST.total++;
  } else {
    btn.classList.add('bad');
    const correctBtn=document.querySelector(`.opt[data-word="${correct}"]`);
    if(correctBtn) correctBtn.classList.add('good');
    document.getElementById('opts').classList.add('shake');
  }

  const fb=document.getElementById('fb');
  if(ok){
    fb.textContent=GOOD_MSG[Math.floor(Math.random()*GOOD_MSG.length)];
    fb.className='feedback good';
  } else {
    fb.textContent=`The answer is: "${correct}" ❌`;
    fb.className='feedback bad';
  }

  updatePills();

  setTimeout(()=>{
    ST.qi++;
    if(ST.qi>=lv.qs.length) showLevelEnd();
    else showQ();
  }, ok?1100:1800);
}

function showLevelEnd(){
  const lv=LEVELS[ST.lv];
  const s=calcStars(ST.lvOk,lv.qs.length);
  ST.lvStars.push(s);
  saveBest();

  const emojis=["😅","🙂","😄","🏆"];
  const msgs=[
    ["Oefenen baart kunst! Probeer het opnieuw!","Goed geprobeerd, ga zo door!"],
    ["Netjes! Je begrijpt het al goed!","Prima gedaan! Blijf oefenen!"],
    ["Heel goed! Je snapt het echt!","Schitterend gedaan! Zo trots!"],
    ["PERFECT! Niet één fout! 🤩","Wauw, geweldig! Alle antwoorden goed!"]
  ];
  const msgArr=msgs[s];
  const msg=msgArr[Math.floor(Math.random()*msgArr.length)];
  const isLast=ST.lv===LEVELS.length-1;

  card.innerHTML=`
    <div class="big-e">${emojis[s]}</div>
    <div class="end-title">${lv.name} klaar!</div>
    <div class="star-row">${starStr(s)}</div>
    <div class="score-txt">${ST.lvOk} van ${lv.qs.length} goed</div>
    <div class="end-msg">${msg}</div>
    <button class="bigbtn" onclick="${isLast?'showFinal()':'nextLevel()'}">
      ${isLast?'Einduitslag bekijken 🏆':'Volgende level &rarr;'}
    </button>
  `;
}

function nextLevel(){
  ST.lv++;
  ST.qi=0;
  ST.lvOk=0;
  showQ();
}

function showFinal(){
  const totalStars=ST.lvStars.reduce((a,b)=>a+b,0);
  const maxStars=LEVELS.length*3;

  let emoji,msg;
  if(totalStars>=13){emoji="🏆";msg="Ongelooflijk goed! Je bent een echte Engelse kampioen!";}
  else if(totalStars>=9){emoji="🌟";msg="Wauw, heel goed gedaan! Je leert zo snel!";}
  else if(totalStars>=5){emoji="😄";msg="Goed geprobeerd! Probeer het nog eens voor meer sterren!";}
  else{emoji="💪";msg="Oefening baart kunst! Speel nog eens en je wordt beter!";}

  const lvRows=LEVELS.map((lv,i)=>`
    <div class="lv-row">
      <span>${lv.name} ${lv.label}</span>
      <span class="lv-row-stars">${starStr(ST.lvStars[i]||0)}</span>
    </div>
  `).join('');

  card.innerHTML=`
    <div style="font-size:3.5rem;margin:8px 0">${emoji}</div>
    <h1>Klaar!</h1>
    <p class="sub">Je hebt alle 5 levels afgerond!</p>
    <div style="font-family:'Fredoka',sans-serif;font-size:1.6rem;font-weight:700;color:var(--violet-dark);margin:8px 0">
      ${ST.total} / 40 goed
    </div>
    <div style="font-weight:700;color:var(--ink-soft);font-size:.9rem;margin-bottom:14px">
      ⭐ ${totalStars} / ${maxStars} sterren
    </div>
    <div class="lv-recap">${lvRows}</div>
    <p style="font-weight:700;color:var(--ink-soft);margin-bottom:20px;font-size:.95rem">${msg}</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="bigbtn" onclick="startGame()">Opnieuw 🔄</button>
      <button class="bigbtn ghostbtn" onclick="location.href='index.html'">Menu 🏠</button>
    </div>
  `;
}

showStart();
</script>
</body>
</html>
