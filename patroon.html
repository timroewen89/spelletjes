<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patroon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{--violet:#8b5cf6;--violet-dark:#7c3aed;}
  .top{width:100%;max-width:560px;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}
  .card{background:#fff;width:100%;max-width:560px;border-radius:30px;padding:28px 24px 32px;box-shadow:0 18px 40px rgba(43,45,107,.12);text-align:center;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
  .sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
  .best{color:var(--violet-dark);font-weight:800;font-size:.9rem;margin-bottom:10px;min-height:1.1em;}
  .levelbar{display:flex;gap:7px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--surface2);}
  .dot.done{background:var(--mint);}
  .dot.active{background:var(--violet);transform:scale(1.3);}
  .level-badge{display:inline-block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;background:var(--surface);color:var(--violet-dark);border-radius:999px;padding:5px 14px;margin-bottom:12px;}
  /* Pattern row */
  .pat-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin:8px 0 20px;}
  .pat-item{width:62px;height:62px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    font-size:2rem;background:var(--surface);box-shadow:0 4px 0 var(--surface2);font-family:'Fredoka',sans-serif;font-weight:700;color:var(--ink);}
  .pat-item.question{background:#ede9fe;box-shadow:0 4px 0 #c4b5fd;font-size:2.2rem;color:var(--violet);}
  .pat-arrow{font-size:1.5rem;color:var(--ink-soft);}
  /* Answer buttons */
  .opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;}
  .opt{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.5rem;color:var(--ink);
    background:var(--surface);border:none;border-radius:16px;
    width:70px;height:70px;cursor:pointer;box-shadow:0 5px 0 var(--surface2);transition:transform .06s;
    display:flex;align-items:center;justify-content:center;}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);}
  .opt.good{background:var(--good);color:#fff;box-shadow:0 5px 0 #11823b;}
  .opt.bad{background:var(--bad);color:#fff;box-shadow:0 5px 0 #a81d1d;}
  .feedback{min-height:32px;font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:700;margin-top:12px;}
  .feedback.good{color:var(--good);}
  .feedback.bad{color:var(--bad);}
  .streak-pill{background:linear-gradient(180deg,#ffe9a8,#ffd45e);}
  .streak-pill .val{color:#8a5b00;}
</style>
</head>
<body>
<a class="back" href="index.html">← Menu</a>
<div class="top">
  <div class="pill"><span class="lbl">Goed</span><span class="val" id="score">0</span></div>
  <div class="pill streak-pill"><span class="lbl">Op rij</span><span class="val" id="streak">0</span></div>
</div>
<div class="card">
  <h1>🔷 Patroon</h1>
  <p class="sub">Wat komt er daarna? Kies het goede antwoord!</p>
  <div class="best" id="bestEl"></div>
  <div class="levelbar" id="levelbar"></div>

  <div id="startScreen">
    <div class="pat-row">
      <div class="pat-item">🔴</div>
      <div class="pat-item">🔵</div>
      <div class="pat-item">🔴</div>
      <div class="pat-item">🔵</div>
      <div class="pat-item question">?</div>
    </div>
    <p style="color:var(--ink-soft);font-weight:700;line-height:1.6;">Bekijk het patroon goed en kies wat er daarna komt.<br>10 vragen — van makkelijk naar moeilijk!</p>
    <br>
    <button class="bigbtn" id="startBtn">Start 🚀</button>
  </div>

  <div id="playScreen" class="hidden-el">
    <div class="level-badge" id="levelBadge">⭐ Makkelijk</div>
    <div class="pat-row" id="patRow"></div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div id="endScreen" class="hidden-el">
    <div style="font-size:3.5rem" id="endEmoji">🎉</div>
    <h1 id="endTitle">Goed gedaan!</h1>
    <p class="sub" id="endText"></p>
    <button class="bigbtn" id="againBtn">Nog een keer 🔁</button>
  </div>
</div>

<script>
// type:'emoji' or 'number'
// show: 4 visible items, ans: the correct 5th item, opts: 4 answer choices (incl. ans)
// level: 1=easy, 2=medium, 3=hard
const BANK=[
  // === Niveau 1: simpele emoji AB-patronen ===
  {show:['🐱','🐶','🐱','🐶'], ans:'🐱', opts:['🐱','🐸','🐹','🐯'], level:1, type:'emoji'},
  {show:['🔴','🔵','🔴','🔵'], ans:'🔴', opts:['🔴','🟢','🟡','🟣'], level:1, type:'emoji'},
  {show:['⭐','🌙','⭐','🌙'], ans:'⭐', opts:['⭐','☀️','🌟','💫'], level:1, type:'emoji'},
  {show:['🍎','🍊','🍎','🍊'], ans:'🍎', opts:['🍎','🍋','🍇','🍓'], level:1, type:'emoji'},
  {show:['🌞','🌧️','🌞','🌧️'], ans:'🌞', opts:['🌞','⛄','🌈','🌊'], level:1, type:'emoji'},
  {show:['🎈','🎀','🎈','🎀'], ans:'🎈', opts:['🎈','🎁','🎊','🎉'], level:1, type:'emoji'},
  // === Niveau 1: getallen +2 ===
  {show:[2,4,6,8],  ans:10, opts:[10,9,11,12],  level:1, type:'number'},
  {show:[1,3,5,7],  ans:9,  opts:[9,8,10,11],   level:1, type:'number'},
  {show:[10,8,6,4], ans:2,  opts:[2,3,1,0],     level:1, type:'number'},
  // === Niveau 2: ABC emoji-patronen ===
  {show:['🔴','🔵','🟢','🔴'], ans:'🔵', opts:['🔵','🔴','🟢','🟡'], level:2, type:'emoji'},
  {show:['🐱','🐶','🐸','🐱'], ans:'🐶', opts:['🐶','🐸','🐱','🐹'], level:2, type:'emoji'},
  {show:['⭐','🌙','☀️','⭐'], ans:'🌙', opts:['🌙','☀️','⭐','🌟'],  level:2, type:'emoji'},
  // === Niveau 2: getallen +5 ===
  {show:[5,10,15,20],   ans:25, opts:[25,22,24,30], level:2, type:'number'},
  {show:[0,5,10,15],    ans:20, opts:[20,18,22,25], level:2, type:'number'},
  {show:[25,20,15,10],  ans:5,  opts:[5,8,3,0],     level:2, type:'number'},
  {show:[10,20,30,40],  ans:50, opts:[50,45,55,60], level:2, type:'number'},
  // === Niveau 3: getallen +3 / +4 ===
  {show:[1,4,7,10],    ans:13, opts:[13,12,14,15], level:3, type:'number'},
  {show:[3,6,9,12],    ans:15, opts:[15,14,16,18], level:3, type:'number'},
  {show:[2,6,10,14],   ans:18, opts:[18,16,17,20], level:3, type:'number'},
  {show:[20,16,12,8],  ans:4,  opts:[4,6,3,2],     level:3, type:'number'},
  {show:[100,90,80,70],ans:60, opts:[60,65,55,50], level:3, type:'number'},
];

const LEVEL_LABELS=['','⭐ Makkelijk','⭐⭐ Gemiddeld','⭐⭐⭐ Moeilijk'];
const TOTAL=10,BKEY='patroon_best';
const shuffle=a=>[...a].map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(p=>p[1]);
const $=id=>document.getElementById(id);

let best=0;try{best=parseInt(localStorage.getItem(BKEY)||'0')||0;}catch(e){}
let queue=[],idx=0,score=0,streak=0,answered=false;

function showBest(){$('bestEl').textContent=best>0?'🏅 Beste: '+best+' / '+TOTAL:'';}showBest();

function buildBar(){
  const b=$('levelbar');b.innerHTML='';
  for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i<idx?' done':i===idx?' active':'');b.appendChild(d);}
}

function render(){
  answered=false;
  const q=queue[idx];
  buildBar();
  $('feedback').textContent='';$('feedback').className='feedback';
  $('levelBadge').textContent=LEVEL_LABELS[q.level];

  // Draw pattern row
  const row=$('patRow');row.innerHTML='';
  q.show.forEach(v=>{
    const d=document.createElement('div');d.className='pat-item';d.textContent=v;row.appendChild(d);
  });
  const arrow=document.createElement('div');arrow.className='pat-arrow';arrow.textContent='→';row.appendChild(arrow);
  const q_item=document.createElement('div');q_item.className='pat-item question';q_item.textContent='?';row.appendChild(q_item);

  // Answer buttons
  const o=$('opts');o.innerHTML='';
  shuffle([...q.opts]).forEach(t=>{
    const b=document.createElement('button');b.className='opt';b.textContent=t;
    b.onclick=()=>answer(b,t,q.ans);o.appendChild(b);
  });
}

function answer(btn,val,ans){
  if(answered)return;answered=true;
  [...$('opts').children].forEach(b=>{
    b.disabled=true;
    if(String(b.textContent)===String(ans))b.classList.add('good');
  });
  const fb=$('feedback');
  if(String(val)===String(ans)){
    score++;streak++;$('score').textContent=score;$('streak').textContent=streak;
    fb.className='feedback good';
    fb.textContent=(streak>=3?'🔥 ':'✅ ')+['Super!','Klopt!','Goed zo!','Slim!'][Math.floor(Math.random()*4)];
  } else {
    streak=0;$('streak').textContent=0;btn.classList.add('bad');
    fb.className='feedback bad';fb.textContent='❌ Het was: '+ans;
  }
  idx++;buildBar();
  setTimeout(()=>idx>=TOTAL?endGame():render(),1300);
}

function startGame(){
  // Pick a balanced mix: 3 level-1, 4 level-2, 3 level-3
  const l1=shuffle(BANK.filter(q=>q.level===1)).slice(0,3);
  const l2=shuffle(BANK.filter(q=>q.level===2)).slice(0,4);
  const l3=shuffle(BANK.filter(q=>q.level===3)).slice(0,3);
  queue=[...l1,...l2,...l3];
  idx=0;score=0;streak=0;
  $('score').textContent=0;$('streak').textContent=0;
  $('startScreen').classList.add('hidden-el');$('endScreen').classList.add('hidden-el');$('playScreen').classList.remove('hidden-el');
  render();
}

function endGame(){
  $('playScreen').classList.add('hidden-el');$('endScreen').classList.remove('hidden-el');
  let rec=false;if(score>best){best=score;rec=true;try{localStorage.setItem(BKEY,String(best));}catch(e){}}showBest();
  $('endText').innerHTML='Je had <b>'+score+' van de '+TOTAL+'</b> goed!'+(rec&&score>0?' 🏅 record!':'');
  $('endEmoji').textContent=score===TOTAL?'🏆':(score>=7?'🎉':'💪');
  $('endTitle').textContent=score===TOTAL?'Patroonmeester!':(score>=7?'Goed gedaan!':'Blijf oefenen!');
}

$('startBtn').onclick=startGame;$('againBtn').onclick=startGame;
</script>
</body>
</html>
