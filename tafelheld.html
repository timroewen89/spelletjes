<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tafelheld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{--violet:#0ea5b5;--violet-dark:#0b8493;}
  .top{width:100%;max-width:560px;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}
  .card{background:#fff;width:100%;max-width:560px;border-radius:30px;padding:26px 24px 30px;box-shadow:0 18px 40px rgba(43,45,107,.12);text-align:center;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
  .sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
  .label{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;margin:6px 0 10px;}
  .tables{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px;}
  .tbtn{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.2rem;color:var(--ink);background:var(--surface);
    border:none;border-radius:14px;padding:14px 0;cursor:pointer;box-shadow:0 5px 0 var(--surface2);position:relative;}
  .tbtn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);}
  .tbtn.master{background:var(--violet);color:#fff;box-shadow:0 5px 0 var(--violet-dark);}
  .tbtn .badge{position:absolute;top:-6px;right:-6px;font-size:.85rem;}
  .mix{grid-column:span 4;background:var(--sun);color:#7a5200;box-shadow:0 5px 0 #d6a420;}
  .mix:active{box-shadow:0 2px 0 #d6a420;}
  .levelbar{display:flex;gap:7px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--surface2);}
  .dot.done{background:var(--mint);}
  .dot.active{background:var(--violet);transform:scale(1.3);}
  .sum{font-family:'Fredoka',sans-serif;font-weight:600;font-size:3rem;color:var(--ink);margin:10px 0 16px;}
  input[type=text]{font-family:'Fredoka',sans-serif;font-size:2rem;text-align:center;padding:12px;border:3px solid var(--surface2);
    border-radius:14px;width:140px;outline:none;color:var(--ink);}
  input[type=text]:focus{border-color:var(--violet);}
  .feedback{min-height:30px;font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:600;margin-top:14px;}
  .feedback.good{color:var(--good);}
  .feedback.bad{color:var(--bad);}
</style>
</head>
<body>
  <a class="back" href="index.html">← Menu</a>
  <div class="top"><div class="pill"><span class="lbl">Goed</span><span class="val" id="score">0</span></div></div>
  <div class="card">
    <h1>✖️ Tafelheld</h1>
    <p class="sub">Oefen de tafels en verdien badges 🏅</p>

    <div id="startScreen">
      <div class="label">Kies een tafel</div>
      <div class="tables" id="tables"></div>
    </div>

    <div id="playScreen" class="hidden-el">
      <div class="levelbar" id="levelbar"></div>
      <div class="sum" id="sum">3 × 4</div>
      <input type="text" id="answer" inputmode="numeric" autocomplete="off" placeholder="?">
      <div><button class="bigbtn" id="checkBtn">Controleer ✓</button></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div id="endScreen" class="hidden-el">
      <div style="font-size:3.2rem" id="endEmoji">🎉</div>
      <h1 id="endTitle">Goed gedaan!</h1>
      <p class="sub" id="endText"></p>
      <button class="bigbtn" id="againBtn">Kies een tafel 🔁</button>
    </div>
  </div>

<script>
  const TOTAL=10, BADGE_KEY="tafelheld_badges";
  let badges=[]; try{badges=JSON.parse(localStorage.getItem(BADGE_KEY)||"[]")||[];}catch(e){}
  let table=1, mix=false, idx=0, score=0, cur=null, answered=false;
  const $=id=>document.getElementById(id);

  function buildTables(){
    const t=$("tables"); t.innerHTML="";
    for(let n=1;n<=10;n++){ const b=document.createElement("button");
      b.className="tbtn"+(badges.includes(n)?" master":""); b.innerHTML=n+(badges.includes(n)?'<span class="badge">🏅</span>':"");
      b.onclick=()=>start(n,false); t.appendChild(b); }
    const mb=document.createElement("button"); mb.className="tbtn mix"; mb.textContent="Door elkaar 🎲";
    mb.onclick=()=>start(0,true); t.appendChild(mb);
  }
  function buildLevelbar(){ const b=$("levelbar"); b.innerHTML="";
    for(let i=0;i<TOTAL;i++){ const d=document.createElement("div"); d.className="dot"+(i<idx?" done":"")+(i===idx?" active":""); b.appendChild(d);} }

  function start(n,m){ table=n; mix=m; idx=0; score=0; $("score").textContent=0;
    $("startScreen").classList.add("hidden-el"); $("endScreen").classList.add("hidden-el"); $("playScreen").classList.remove("hidden-el");
    next(); }
  function next(){ answered=false; buildLevelbar(); $("feedback").textContent=""; $("feedback").className="feedback";
    const T=mix?(1+Math.floor(Math.random()*10)):table; const f=1+Math.floor(Math.random()*10);
    cur={a:T,b:f,ans:T*f}; $("sum").textContent=T+" × "+f; $("answer").value=""; $("answer").focus(); }
  function check(){
    if(answered) return; const v=$("answer").value.trim(); if(v==="") return; answered=true;
    const fb=$("feedback");
    if(parseInt(v,10)===cur.ans){ score++; $("score").textContent=score; fb.className="feedback good"; fb.textContent="✅ Goed!"; }
    else { fb.className="feedback bad"; fb.textContent="❌ Het was "+cur.ans; }
    idx++; buildLevelbar();
    setTimeout(()=>{ if(idx>=TOTAL) endGame(); else next(); }, 850);
  }
  function endGame(){
    $("playScreen").classList.add("hidden-el"); $("endScreen").classList.remove("hidden-el");
    let mastered=false;
    if(!mix && score>=8 && !badges.includes(table)){ badges.push(table); mastered=true;
      try{localStorage.setItem(BADGE_KEY,JSON.stringify(badges));}catch(e){} }
    $("endEmoji").textContent=score===TOTAL?"🏆":(score>=8?"🏅":(score>=5?"💪":"📚"));
    $("endTitle").textContent=score===TOTAL?"Foutloos!":(score>=8?"Tafel gehaald!":"Blijf oefenen!");
    let txt="Je had <b>"+score+" van de "+TOTAL+"</b> goed!";
    if(mastered) txt+="<br>🏅 Tafel van "+table+" als badge verdiend!";
    else if(!mix && score<8) txt+="<br>Haal er 8 of meer voor de badge van de tafel van "+table+".";
    $("endText").innerHTML=txt;
  }
  $("checkBtn").onclick=check;
  $("answer").addEventListener("keydown",e=>{ if(e.key==="Enter")check(); });
  $("againBtn").onclick=()=>{ $("endScreen").classList.add("hidden-el"); $("startScreen").classList.remove("hidden-el"); buildTables(); };
  buildTables();
</script>
</body>
</html>
