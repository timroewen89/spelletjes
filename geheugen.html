<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geheugenspel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{--violet:#ec5aa0;--violet-dark:#c43f80;}
  .top{width:100%;max-width:460px;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}
  .card{background:#fff;width:100%;max-width:460px;border-radius:30px;padding:24px;box-shadow:0 18px 40px rgba(43,45,107,.12);text-align:center;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
  .sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
  .best{color:var(--violet-dark);font-weight:800;font-size:.9rem;margin-bottom:10px;min-height:1.1em;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .tile{aspect-ratio:1;border:none;border-radius:16px;background:var(--violet);cursor:pointer;
    font-size:2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 var(--violet-dark);
    color:#fff;transition:transform .1s;}
  .tile:active{transform:scale(.96);}
  .tile.open{background:#fff;box-shadow:0 5px 0 var(--surface2);}
  .tile.done{background:var(--surface);box-shadow:none;opacity:.65;}
</style>
</head>
<body>
  <a class="back" href="index.html">← Menu</a>
  <div class="top">
    <div class="pill"><span class="lbl">Zetten</span><span class="val" id="moves">0</span></div>
    <div class="pill"><span class="lbl">Tijd</span><span class="val" id="time">0s</span></div>
    <div class="pill"><span class="lbl">Beste</span><span class="val" id="best">–</span></div>
  </div>
  <div class="card">
    <h1>🧠 Geheugenspel</h1>
    <p class="sub">Vind alle paren — onthoud waar ze liggen!</p>
    <div class="best" id="bestline"></div>

    <div id="startScreen">
      <p class="sub">Draai twee kaartjes om. Zijn ze gelijk? Dan blijven ze open. Vind alle 8 paren met zo min mogelijk zetten!</p>
      <button class="bigbtn" id="startBtn">Start 🚀</button>
    </div>

    <div id="playScreen" class="hidden-el">
      <div class="grid" id="grid"></div>
    </div>

    <div id="endScreen" class="hidden-el">
      <div style="font-size:3.2rem">🏆</div>
      <h1 id="endTitle">Alles gevonden!</h1>
      <p class="sub" id="endText"></p>
      <button class="bigbtn" id="againBtn">Nog een keer 🔁</button>
    </div>
  </div>

<script>
  const SYMS=["🐶","🐱","🦊","🐼","🐸","🐵","🦁","🐯"];
  const BEST_KEY="geheugen_best";
  let best=null; try{const b=localStorage.getItem(BEST_KEY); if(b)best=parseInt(b,10);}catch(e){}
  const $=id=>document.getElementById(id);
  function showBest(){ $("best").textContent=best!=null?best:"–"; $("bestline").textContent=best!=null?("🏅 Minste zetten: "+best):""; }
  showBest();

  let cards=[], first=null, lock=false, moves=0, matched=0, time=0, timer=null, started=false;
  const shuffle=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1]);

  function startGame(){
    moves=0; matched=0; time=0; first=null; lock=false; started=false;
    $("moves").textContent=0; $("time").textContent="0s";
    clearInterval(timer);
    cards=shuffle([...SYMS,...SYMS]).map((s,i)=>({sym:s,id:i,open:false,done:false}));
    $("startScreen").classList.add("hidden-el"); $("endScreen").classList.add("hidden-el"); $("playScreen").classList.remove("hidden-el");
    renderGrid();
  }
  function renderGrid(){
    const g=$("grid"); g.innerHTML="";
    cards.forEach(c=>{ const b=document.createElement("button");
      b.className="tile"+(c.done?" done":(c.open?" open":""));
      b.textContent=(c.open||c.done)?c.sym:"";
      b.onclick=()=>flip(c); g.appendChild(b);
    });
  }
  function flip(c){
    if(lock||c.open||c.done) return;
    if(!started){ started=true; timer=setInterval(()=>{ time++; $("time").textContent=time+"s"; },1000); }
    c.open=true; renderGrid();
    if(!first){ first=c; return; }
    moves++; $("moves").textContent=moves;
    if(first.sym===c.sym){ first.done=c.done=true; first.open=c.open=false; matched++; first=null; renderGrid();
      if(matched===SYMS.length) win();
    } else {
      lock=true; const a=first, b=c; first=null;
      setTimeout(()=>{ a.open=false; b.open=false; lock=false; renderGrid(); }, 800);
    }
  }
  function win(){
    clearInterval(timer);
    let rec=false; if(best==null||moves<best){best=moves;rec=true;try{localStorage.setItem(BEST_KEY,String(best));}catch(e){}}
    showBest();
    setTimeout(()=>{
      $("playScreen").classList.add("hidden-el"); $("endScreen").classList.remove("hidden-el");
      $("endTitle").textContent=moves<=12?"🏆 Superbrein!":(moves<=18?"💪 Knap onthouden!":"Gevonden!");
      $("endText").innerHTML="In <b>"+moves+" zetten</b> en "+time+" seconden!"+(rec?" 🏅 Nieuw record!":"");
    },500);
  }
  $("startBtn").onclick=startGame; $("againBtn").onclick=startGame;
</script>
</body>
</html>
