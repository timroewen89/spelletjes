<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rijmen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root{--violet:#f43f5e;--violet-dark:#e11d48;}
  .top{width:100%;max-width:520px;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}
  .card{background:#fff;width:100%;max-width:520px;border-radius:30px;padding:28px 24px 32px;box-shadow:0 18px 40px rgba(43,45,107,.12);text-align:center;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:2rem;color:var(--violet-dark);}
  .sub{color:var(--ink-soft);font-weight:700;margin-top:4px;margin-bottom:14px;}
  .best{color:var(--violet-dark);font-weight:800;font-size:.9rem;margin-bottom:10px;min-height:1.1em;}
  .levelbar{display:flex;gap:7px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--surface2);}
  .dot.done{background:var(--mint);}
  .dot.active{background:var(--violet);transform:scale(1.3);}
  .word-show{margin:8px 0 20px;}
  .word-emoji{font-size:4.5rem;line-height:1;display:block;margin-bottom:8px;animation:pop .3s ease;}
  .word-text{font-family:'Fredoka',sans-serif;font-size:2.6rem;font-weight:700;color:var(--ink);}
  .prompt{color:var(--ink-soft);font-weight:700;font-size:1rem;margin-bottom:14px;}
  .prompt b{color:var(--violet-dark);}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.4rem;color:var(--ink);
    background:var(--surface);border:none;border-radius:18px;padding:18px 10px;
    cursor:pointer;box-shadow:0 5px 0 var(--surface2);transition:transform .06s;}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 var(--surface2);}
  .opt.good{background:var(--good);color:#fff;box-shadow:0 5px 0 #11823b;}
  .opt.bad{background:var(--bad);color:#fff;box-shadow:0 5px 0 #a81d1d;}
  .feedback{min-height:34px;font-family:'Fredoka',sans-serif;font-size:1.3rem;font-weight:700;margin-top:14px;}
  .feedback.good{color:var(--good);}
  .feedback.bad{color:var(--bad);}
  .streak-pill{background:linear-gradient(180deg,#ffe9a8,#ffd45e);}
  .streak-pill .val{color:#8a5b00;}
  @keyframes pop{0%{transform:scale(.6);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
</style>
</head>
<body>
<a class="back" href="index.html">← Menu</a>
<div class="top">
  <div class="pill"><span class="lbl">Goed</span><span class="val" id="score">0</span></div>
  <div class="pill streak-pill"><span class="lbl">Op rij</span><span class="val" id="streak">0</span></div>
</div>
<div class="card">
  <h1>🎵 Rijmen</h1>
  <p class="sub">Welk woord rijmt? Kies het goede antwoord!</p>
  <div class="best" id="bestEl"></div>
  <div class="levelbar" id="levelbar"></div>

  <div id="startScreen">
    <div class="word-show">
      <span class="word-emoji">🎵</span>
      <span class="word-text">rijmen!</span>
    </div>
    <p class="prompt">Kies het woord dat rijmt op het gegeven woord.<br>10 vragen — doe je best!</p>
    <button class="bigbtn" id="startBtn">Start 🚀</button>
  </div>

  <div id="playScreen" class="hidden-el">
    <div class="word-show">
      <span class="word-emoji" id="emoji"></span>
      <span class="word-text" id="wordEl"></span>
    </div>
    <p class="prompt">Welk woord rijmt op <b id="wordPrompt"></b>?</p>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div id="endScreen" class="hidden-el">
    <div style="font-size:3.5rem" id="endEmoji">🎉</div>
    <h1 id="endTitle">Goed gedaan!</h1>
    <p class="sub" id="endText"></p>
    <button class="bigbtn" id="againBtn">Nog een keer 🔁</button>
  </div>
</div>

<script>
// {word, emoji, answer, opts}  — opts bevat het goede antwoord + 3 afleiders
const BANK=[
  {w:'kat',  e:'🐱', a:'mat',  o:['mat','hond','vis','boom']},
  {w:'hond', e:'🐶', a:'mond', o:['mond','poot','oor','staart']},
  {w:'maan', e:'🌙', a:'baan', o:['baan','ster','wolk','zon']},
  {w:'boom', e:'🌳', a:'room', o:['room','tak','blad','wortel']},
  {w:'huis', e:'🏠', a:'muis', o:['muis','deur','raam','dak']},
  {w:'roos', e:'🌹', a:'boos', o:['boos','blad','doorn','geur']},
  {w:'peer', e:'🍐', a:'meer', o:['meer','appel','pit','schil']},
  {w:'boot', e:'⛵', a:'noot', o:['noot','roer','mast','golf']},
  {w:'zon',  e:'☀️', a:'bon',  o:['bon','straal','warmte','licht']},
  {w:'dag',  e:'🌞', a:'mag',  o:['mag','nacht','uur','week']},
  {w:'bal',  e:'⚽', a:'hal',  o:['hal','trap','schop','goal']},
  {w:'koe',  e:'🐄', a:'toe',  o:['toe','paard','schaap','geit']},
  {w:'beer', e:'🐻', a:'veer', o:['veer','klauw','neus','hol']},
  {w:'pap',  e:'🥣', a:'sap',  o:['sap','bord','lepel','kom']},
  {w:'raam', e:'🪟', a:'naam', o:['naam','gordijn','glas','deur']},
  {w:'vis',  e:'🐟', a:'dis',  o:['dis','schub','staart','fin']},
  {w:'kam',  e:'🪮', a:'dam',  o:['dam','haar','borstel','clip']},
  {w:'stoel',e:'🪑', a:'doel', o:['doel','tafel','bank','kussen']},
  {w:'ster', e:'⭐', a:'ber',  o:['ver','maan','wolk','zon']},
  {w:'neus', e:'👃', a:'leus', o:['leus','oor','mond','oog']},
];

const TOTAL=10,BKEY='rijmen_best';
const shuffle=a=>[...a].map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(p=>p[1]);
const $=id=>document.getElementById(id);

let best=0;try{best=parseInt(localStorage.getItem(BKEY)||'0')||0;}catch(e){}
let queue=[],idx=0,score=0,streak=0,answered=false;

function showBest(){$('bestEl').textContent=best>0?'🏅 Beste: '+best+' / '+TOTAL:'';}showBest();

function buildBar(){
  const b=$('levelbar');b.innerHTML='';
  for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i<idx?' done':i===idx?' active':'');b.appendChild(d);}
}

function render(){
  answered=false;
  const q=queue[idx];
  buildBar();
  $('feedback').textContent='';$('feedback').className='feedback';
  $('emoji').textContent=q.e;
  $('wordEl').textContent=q.w;
  $('wordPrompt').textContent=q.w;
  const o=$('opts');o.innerHTML='';
  shuffle([...q.o]).forEach(t=>{
    const b=document.createElement('button');b.className='opt';b.textContent=t;
    b.onclick=()=>answer(b,t,q.a);o.appendChild(b);
  });
}

function answer(btn,val,ans){
  if(answered)return;answered=true;
  [...$('opts').children].forEach(b=>{b.disabled=true;if(b.textContent===ans)b.classList.add('good');});
  const fb=$('feedback');
  if(val===ans){
    score++;streak++;$('score').textContent=score;$('streak').textContent=streak;
    fb.className='feedback good';
    fb.textContent=(streak>=3?'🔥 ':'✅ ')+['Super!','Top!','Goed zo!','Slim!','Ja!'][Math.floor(Math.random()*5)];
  } else {
    streak=0;$('streak').textContent=0;btn.classList.add('bad');
    fb.className='feedback bad';fb.textContent='❌ '+ans+' rijmt op '+queue[idx].w+'!';
  }
  idx++;buildBar();
  setTimeout(()=>idx>=TOTAL?endGame():render(),1300);
}

function startGame(){
  queue=shuffle([...BANK]).slice(0,TOTAL);idx=0;score=0;streak=0;
  $('score').textContent=0;$('streak').textContent=0;
  $('startScreen').classList.add('hidden-el');$('endScreen').classList.add('hidden-el');$('playScreen').classList.remove('hidden-el');
  render();
}

function endGame(){
  $('playScreen').classList.add('hidden-el');$('endScreen').classList.remove('hidden-el');
  let rec=false;if(score>best){best=score;rec=true;try{localStorage.setItem(BKEY,String(best));}catch(e){}}showBest();
  $('endText').innerHTML='Je had <b>'+score+' van de '+TOTAL+'</b> goed!'+(rec&&score>0?' 🏅 record!':'');
  $('endEmoji').textContent=score===TOTAL?'🏆':(score>=7?'🎉':'💪');
  $('endTitle').textContent=score===TOTAL?'Rijmkampioen!':(score>=7?'Goed gedaan!':'Blijf oefenen!');
}

$('startBtn').onclick=startGame;$('againBtn').onclick=startGame;
</script>
</body>
</html>
